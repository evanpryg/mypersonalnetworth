// Safe localStorage wrapper — prevents crashes when browser blocks storage
var safeStorage = {
  getItem: function(key) { try { return localStorage.getItem(key); } catch(e) { return null; } },
  setItem: function(key, val) { try { localStorage.setItem(key, val); } catch(e) {} },
  removeItem: function(key) { try { localStorage.removeItem(key); } catch(e) {} }
};

// The active Supabase client instance
var _sb = null;

function getSupabaseCredentials() {
  var url = HARDCODED_SUPABASE_URL || safeStorage.getItem('supabase_url') || '';
  var key = HARDCODED_SUPABASE_KEY || safeStorage.getItem('supabase_key') || '';
  return { url: url, key: key };
}

// Case-insensitive key mapper dictionaries to bridge PostgreSQL and frontend logic
var KEY_MAP = {
  'id': 'id',
  'timestamp': 'Timestamp',
  'date': 'Date',
  'notes': 'Notes',
  'status': 'Status',
  'targetid': 'TargetID',
  'targetname': 'TargetName',
  'targetamount': 'TargetAmount',
  'targetcurrency': 'TargetCurrency',
  'startdate': 'StartDate',
  'platform': 'Platform',
  'sector': 'Sector',
  'asset': 'Asset',
  'transactiontype': 'TransactionType',
  'amountidr': 'AmountIDR',
  'currentvalueidr': 'CurrentValueIDR',
  'key': 'Key',
  'value': 'Value',
  'targetpercent': 'TargetPercent',
  'accountid': 'AccountID',
  'name': 'Name',
  'icon': 'Icon',
  'initialbalance': 'InitialBalance',
  'order': 'Order',
  'showondashboard': 'ShowOnDashboard',
  'type': 'Type',
  'account': 'Account',
  'accountto': 'AccountTo',
  'category': 'Category',
  'subcategory': 'Subcategory',
  'amount': 'Amount',
  'percent': 'Percent',
  'color': 'Color'
};

function mapRowToFrontend(row) {
  if (!row) return row;
  var mapped = {};
  for (var k in row) {
    var targetKey = KEY_MAP[k.toLowerCase()] || k;
    mapped[targetKey] = row[k];
  }
  return mapped;
}

function mapRowToDb(row) {
  if (!row) return row;
  var mapped = {};
  for (var k in row) {
    mapped[k.toLowerCase()] = row[k];
  }
  return mapped;
}

// Helpers
function normalize_(value) { return String(value || '').trim(); }
function normalizeUpper_(value) { return normalize_(value).toUpperCase(); }
function toNumber_(value) { var n = Number(value); return isNaN(n) ? 0 : n; }
function makeAssetKey_(platform, sector, asset) {
  return [normalizeUpper_(platform), normalizeUpper_(sector), normalizeUpper_(asset)].join('|');
}
function getCashAssetName_(platform) { return normalize_(platform) + ' Cash'; }
function formatDateForClient_(value) {
  if (!value) return '';
  var d = new Date(value);
  if (isNaN(d.getTime())) return String(value);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function formatTimestampForClient_(value) {
  if (!value) return '';
  var d = new Date(value);
  if (isNaN(d.getTime())) return String(value);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');
}

// Get raw rows from Supabase (auto-mapped to frontend keys)
async function getRows_(tableName) {
  if (!_sb) throw new Error("Supabase is not initialized.");
  var { data, error } = await _sb.from(tableName.toLowerCase()).select('*');
  if (error) { console.error('Error reading ' + tableName + ':', error); throw error; }
  var mappedData = data.map(mapRowToFrontend);
  var dateFields = ['Timestamp', 'Date', 'StartDate'];
  mappedData.forEach(function(row) {
    dateFields.forEach(function(field) {
      if (row[field] && typeof row[field] === 'string') row[field] = new Date(row[field]);
    });
  });
  return mappedData;
}

// Ported Database API Methods
var DB_API = {
  // SETTINGS
  async getSettings() {
    var rows = await getRows_('settings');
    var settings = {};
    rows.forEach(function(row) {
      var key = normalize_(row.Key);
      var value = normalize_(row.Value);
      if (!key || !value) return;
      if (!settings[key]) settings[key] = [];
      if (!settings[key].includes(value)) settings[key].push(value);
    });
    return settings;
  },

  async addSettingItem(payload) {
    var key = normalize_(payload.key);
    var value = normalize_(payload.value);
    if (!key || !value) throw new Error('Key and value are required.');
    var rows = await getRows_('settings');
    var exists = rows.some(function(row) { return normalizeUpper_(row.Key) === normalizeUpper_(key) && normalizeUpper_(row.Value) === normalizeUpper_(value); });
    if (exists) return { success: false, message: value + ' already exists in ' + key + '.' };
    var { error } = await _sb.from('settings').insert(mapRowToDb({ Key: key, Value: value }));
    if (error) throw error;
    return { success: true, message: value + ' added to ' + key + '.' };
  },

  // TARGETS
  async getMainTarget_() {
    var targets = await getRows_('targets');
    if (targets.length === 0) return { TargetID: 'T001', TargetName: 'First 100 Million', TargetAmount: 100000000, TargetCurrency: 'IDR', StartDate: '', Notes: '' };
    return targets[0];
  },

  async updateMainTarget(payload) {
    var targetName = normalize_(payload.targetName);
    var targetAmount = toNumber_(payload.targetAmount);
    var targetCurrency = normalizeUpper_(payload.targetCurrency || 'IDR');
    var notes = normalize_(payload.notes);
    if (!targetName) throw new Error('Target name is required.');
    if (targetAmount <= 0) throw new Error('Target amount must be greater than 0.');
    var targets = await getRows_('targets');
    if (targets.length === 0) {
      var { error } = await _sb.from('targets').insert(mapRowToDb({ TargetID: 'T001', TargetName: targetName, TargetAmount: targetAmount, TargetCurrency: targetCurrency, StartDate: new Date(), Notes: notes }));
      if (error) throw error;
    } else {
      var { error } = await _sb.from('targets').update(mapRowToDb({ TargetName: targetName, TargetAmount: targetAmount, TargetCurrency: targetCurrency, Notes: notes })).eq('targetid', targets[0].TargetID);
      if (error) throw error;
    }
    return { success: true, message: 'Main target updated successfully.' };
  },

  // PORTFOLIO
  async getPortfolioSheet_() {
    var rows = await getRows_('portfolio');
    var values = {};
    rows.forEach(function(row) {
      var platform = normalize_(row.Platform), sector = normalize_(row.Sector), asset = normalize_(row.Asset);
      var currentValueIDR = toNumber_(row.CurrentValueIDR);
      if (!platform || !sector || !asset) return;
      values[makeAssetKey_(platform, sector, asset)] = currentValueIDR;
    });
    return values;
  },

  async updateAssetValue(payload) {
    var platform = normalize_(payload.platform), sector = normalize_(payload.sector), asset = normalize_(payload.asset);
    var currentValueIDR = toNumber_(payload.currentValueIDR);
    if (!platform || !sector || !asset) throw new Error('Platform, Sector, and Asset are required.');
    var { error } = await _sb.from('portfolio').upsert(mapRowToDb({ Platform: platform, Sector: sector, Asset: asset, CurrentValueIDR: currentValueIDR }));
    if (error) throw error;
    return { success: true, message: 'Asset value updated successfully.' };
  },

  // ALLOCATION TARGETS (INVESTMENT)
  async getAllocationTargets() {
    var rows = await getRows_('allocation_targets');
    return rows.filter(function(r) { return normalize_(r.Sector); }).map(function(r) { return { sector: normalize_(r.Sector), targetPercent: toNumber_(r.TargetPercent) }; });
  },

  async getAllocationTargets_() {
    var rows = await getRows_('allocation_targets');
    var targets = {};
    rows.forEach(function(r) { var s = normalize_(r.Sector), tp = toNumber_(r.TargetPercent); if (s && tp > 0) targets[s] = tp; });
    return targets;
  },

  async saveAllocationTargets(payload) {
    var items = payload.items || [];
    var cleanedItems = items.map(function(i) { return { sector: normalize_(i.sector), targetPercent: toNumber_(i.targetPercent) }; }).filter(function(i) { return i.sector && i.targetPercent >= 0; });
    var total = cleanedItems.reduce(function(s, i) { return s + i.targetPercent; }, 0);
    if (cleanedItems.length === 0) throw new Error('Allocation target cannot be empty.');
    if (Math.abs(total - 100) > 0.01) throw new Error('Total allocation must be 100%. Current total is ' + total + '%.');
    var { error: delError } = await _sb.from('allocation_targets').delete().neq('sector', '');
    if (delError) throw delError;
    var { error: insError } = await _sb.from('allocation_targets').insert(cleanedItems.map(function(i) { return mapRowToDb({ Sector: i.sector, TargetPercent: i.targetPercent }); }));
    if (insError) throw insError;
    return { success: true, message: 'Allocation targets saved successfully.' };
  },

  // DASHBOARD DATA
  async getDashboardData() {
    var target = await this.getMainTarget_();
    var allTransactions = await getRows_('transactions');
    var transactions = allTransactions.filter(function(r) { return normalize_(r.Status || 'Active') !== 'Deleted'; });
    var persistedValues = await this.getPortfolioSheet_();
    var allocationTargets = await this.getAllocationTargets_();
    var portfolioMap = {};

    function ensurePortfolioItem_(pm, platform, sector, asset) {
      var key = makeAssetKey_(platform, sector, asset);
      if (!pm[key]) pm[key] = { Platform: normalize_(platform), Sector: normalize_(sector), Asset: normalize_(asset), TotalCapitalIDR: 0, CurrentValueIDR: 0, ProfitLossIDR: 0, GrowthPercent: 0 };
      return pm[key];
    }
    function addCashMovement_(pm, platform, amountIDR) {
      var cashItem = ensurePortfolioItem_(pm, platform, 'Cash', getCashAssetName_(platform));
      cashItem.TotalCapitalIDR += amountIDR;
    }

    transactions.forEach(function(row) {
      var platform = normalize_(row.Platform), sector = normalize_(row.Sector), asset = normalize_(row.Asset), type = normalize_(row.TransactionType);
      if (!platform || !type) return;
      var amountIDR = toNumber_(row.AmountIDR);
      if (type === 'Buy') { if (!sector||!asset) return; ensurePortfolioItem_(portfolioMap, platform, sector, asset).TotalCapitalIDR += amountIDR; addCashMovement_(portfolioMap, platform, -amountIDR); }
      else if (type === 'Sell') { if (!sector||!asset) return; ensurePortfolioItem_(portfolioMap, platform, sector, asset).TotalCapitalIDR -= amountIDR; addCashMovement_(portfolioMap, platform, amountIDR); }
      else if (type === 'Deposit') { addCashMovement_(portfolioMap, platform, amountIDR); }
      else if (type === 'Withdraw') { addCashMovement_(portfolioMap, platform, -amountIDR); }
      else if (type === 'Initial Holding') { if (!sector||!asset) return; ensurePortfolioItem_(portfolioMap, platform, sector, asset).TotalCapitalIDR += amountIDR; }
      else if (type === 'Cash Adjustment') { addCashMovement_(portfolioMap, platform, amountIDR); }
    });

    var portfolio = Object.values(portfolioMap).map(function(item) {
      var key = makeAssetKey_(item.Platform, item.Sector, item.Asset);
      if (item.Sector === 'Cash') { item.CurrentValueIDR = item.TotalCapitalIDR; item.ProfitLossIDR = 0; item.GrowthPercent = 0; return item; }
      item.CurrentValueIDR = (persistedValues[key] !== undefined) ? persistedValues[key] : item.TotalCapitalIDR;
      item.ProfitLossIDR = item.CurrentValueIDR - item.TotalCapitalIDR;
      item.GrowthPercent = item.TotalCapitalIDR > 0 ? item.ProfitLossIDR / item.TotalCapitalIDR : 0;
      return item;
    });

    var investedAssets = portfolio.filter(function(i) { return i.Sector !== 'Cash'; });
    var cashItems = portfolio.filter(function(i) { return i.Sector === 'Cash'; });
    var totalInvestedAssetsIDR = investedAssets.reduce(function(s,i) { return s + i.CurrentValueIDR; }, 0);
    var totalCashIDR = cashItems.reduce(function(s,i) { return s + i.CurrentValueIDR; }, 0);
    var totalPortfolioValueIDR = totalInvestedAssetsIDR + totalCashIDR;
    var totalCapitalIDR = investedAssets.reduce(function(s,i) { return s + i.TotalCapitalIDR; }, 0);
    var totalProfitLossIDR = investedAssets.reduce(function(s,i) { return s + i.ProfitLossIDR; }, 0);
    var targetAmount = toNumber_(target.TargetAmount) || 100000000;
    var progressPercent = targetAmount > 0 ? totalPortfolioValueIDR / targetAmount : 0;
    var remainingAmountIDR = Math.max(targetAmount - totalPortfolioValueIDR, 0);

    var averageMonthlyInvestmentIDR = (function(txs) {
      var monthly = {};
      txs.forEach(function(r) { var type = normalize_(r.TransactionType); if (!['Initial Holding','Deposit'].includes(type)) return; var d = new Date(r.Date); if (isNaN(d.getTime())) return; var k = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); if (!monthly[k]) monthly[k]=0; monthly[k]+=toNumber_(r.AmountIDR); });
      var vals = Object.values(monthly); return vals.length === 0 ? 0 : vals.reduce(function(a,b){return a+b;},0)/vals.length;
    })(transactions);
    var estimatedMonthsLeft = averageMonthlyInvestmentIDR > 0 ? Math.ceil(remainingAmountIDR / averageMonthlyInvestmentIDR) : null;

    var sectorMap = {};
    portfolio.forEach(function(i) { if (!sectorMap[i.Sector]) sectorMap[i.Sector]=0; sectorMap[i.Sector]+=i.CurrentValueIDR; });
    var totalSectorVal = Object.values(sectorMap).reduce(function(s,v){return s+v;},0);
    var allocationBySector = Object.keys(sectorMap).map(function(sector) {
      var valueIDR = sectorMap[sector], actualPercent = totalSectorVal > 0 ? (valueIDR/totalSectorVal)*100 : 0;
      var targetPercent = allocationTargets[sector] || 0, difference = actualPercent - targetPercent;
      var status = 'No Target';
      if (targetPercent > 0) { if (Math.abs(difference)<=3) status='Balanced'; else if (difference>3) status='Overweight'; else status='Underweight'; }
      return { sector:sector, valueIDR:valueIDR, actualPercent:actualPercent, targetPercent:targetPercent, difference:difference, status:status };
    });
    var cashByPlatform = cashItems.map(function(i) { return { platform:i.Platform, asset:i.Asset, cashBalanceIDR:i.CurrentValueIDR }; });

    var rebalanceSuggestions = (function(abs, tc) {
      if (!abs||abs.length===0||tc<=0) return [];
      var uw = abs.filter(function(i){return i.sector!=='Cash'&&i.status==='Underweight';}).map(function(i){return{sector:i.sector,actualPercent:Number(i.actualPercent)||0,targetPercent:Number(i.targetPercent)||0,gapPercent:Math.abs(Number(i.difference)||0)};}).filter(function(i){return i.gapPercent>0;});
      if (uw.length===0) return [];
      var tg = uw.reduce(function(s,i){return s+i.gapPercent;},0);
      return uw.map(function(i){var p=tg>0?i.gapPercent/tg:0;return{sector:i.sector,actualPercent:i.actualPercent,targetPercent:i.targetPercent,gapPercent:i.gapPercent,portion:p,suggestedAmountIDR:tc*p};}).sort(function(a,b){return b.suggestedAmountIDR-a.suggestedAmountIDR;});
    })(allocationBySector, totalCashIDR);

    return { target:{name:target.TargetName||'First 100 Million',amount:targetAmount,currency:target.TargetCurrency||'IDR'}, summary:{totalPortfolioValueIDR:totalPortfolioValueIDR,totalInvestedAssetsIDR:totalInvestedAssetsIDR,totalCashIDR:totalCashIDR,totalCapitalIDR:totalCapitalIDR,totalProfitLossIDR:totalProfitLossIDR,progressPercent:progressPercent,remainingAmountIDR:remainingAmountIDR,averageMonthlyInvestmentIDR:averageMonthlyInvestmentIDR,estimatedMonthsLeft:estimatedMonthsLeft}, allocationTargets:allocationTargets, allocationBySector:allocationBySector, cashByPlatform:cashByPlatform, rebalanceSuggestions:rebalanceSuggestions, portfolio:portfolio };
  },

  async addTransaction(payload) {
    var platform = normalize_(payload.platform), transactionType = normalize_(payload.transactionType), amountIDR = toNumber_(payload.amountIDR);
    var sector = normalize_(payload.sector), asset = normalize_(payload.asset);
    if (transactionType==='Deposit'||transactionType==='Withdraw') { sector='Cash'; asset=getCashAssetName_(platform); }
    var { error } = await _sb.from('transactions').insert(mapRowToDb({ Date:payload.date, Platform:platform, Sector:sector, Asset:asset, TransactionType:transactionType, AmountIDR:amountIDR, Notes:payload.notes||'', Status:'Active' }));
    if (error) throw error;
    return { success:true, message:'Transaction added successfully.' };
  },

  async syncCashBalance(payload) {
    var platform = normalize_(payload.platform), actualBalance = toNumber_(payload.actualBalance), notes = normalize_(payload.notes) || 'Balance sync';
    if (!platform) throw new Error('Platform is required.');
    var dashData = await this.getDashboardData();
    var cashItem = dashData.portfolio.find(function(i){return i.Sector==='Cash'&&i.Platform===platform;});
    var currentCash = cashItem ? cashItem.CurrentValueIDR : 0, difference = actualBalance - currentCash;
    if (Math.abs(difference)<1) return { success:true, message:'Balance already in sync.' };
    var todayStr = new Date().toISOString().slice(0,10);
    var { error } = await _sb.from('transactions').insert(mapRowToDb({ Date:todayStr, Platform:platform, Sector:'Cash', Asset:getCashAssetName_(platform), TransactionType:'Cash Adjustment', AmountIDR:difference, Notes:notes, Status:'Active' }));
    if (error) throw error;
    return { success:true, message:'Balance synced. Adjusted '+(difference>=0?'+':'')+difference.toLocaleString('id-ID')+'.' };
  },

  async getAssetOptions() {
    var dd = await this.getDashboardData();
    return dd.portfolio.filter(function(i){return i.Sector!=='Cash'&&i.TotalCapitalIDR>0;}).map(function(i){return{platform:i.Platform,sector:i.Sector,asset:i.Asset,currentValueIDR:i.CurrentValueIDR};}).sort(function(a,b){return a.platform.localeCompare(b.platform)||a.sector.localeCompare(b.sector)||a.asset.localeCompare(b.asset);});
  },

  async getHistoryData() {
    var raw = await getRows_('transactions');
    var transactions = raw.map(function(row){return{rowNumber:row.id,timestamp:formatTimestampForClient_(row.Timestamp),date:formatDateForClient_(row.Date),platform:row.Platform||'',sector:row.Sector||'',asset:row.Asset||'',transactionType:row.TransactionType||'',amountIDR:toNumber_(row.AmountIDR),notes:row.Notes||'',status:row.Status||'Active'};}).filter(function(i){return i.status!=='Deleted'&&(i.asset||i.transactionType||i.amountIDR);}).reverse().slice(0,50);
    return { transactions:transactions };
  },

  async deleteTransaction(rowNumber) {
    var { error } = await _sb.from('transactions').update({status:'Deleted'}).eq('id',rowNumber);
    if (error) throw error;
    return { success:true, message:'Transaction deleted successfully.' };
  },

  // MONEY MANAGEMENT
  async mmGetAccounts() {
    var rows = await getRows_('mm_accounts');
    return rows.filter(function(r){return normalize_(r.Status||'Active')!=='Deleted';}).map(function(r){
      var showDb = r.ShowOnDashboard;
      var showOnDashboard = false;
      if (typeof showDb === 'boolean') {
        showOnDashboard = showDb;
      } else if (showDb !== undefined && showDb !== null) {
        var s = String(showDb).trim().toLowerCase();
        showOnDashboard = (s === 'true' || s === '1' || s === 'yes' || s === 't');
      }
      return {id:normalize_(r.AccountID),name:normalize_(r.Name),icon:normalize_(r.Icon)||'💳',initialBalance:toNumber_(r.InitialBalance),order:toNumber_(r.Order),showOnDashboard:showOnDashboard,status:normalize_(r.Status)||'Active'};
    }).sort(function(a,b){return a.order-b.order;});
  },

  async mmAddAccount(payload) {
    var id = 'ACC_'+Date.now();
    var { error } = await _sb.from('mm_accounts').insert(mapRowToDb({ AccountID:id, Name:normalize_(payload.name), Icon:normalize_(payload.icon)||'💳', InitialBalance:toNumber_(payload.initialBalance), Order:toNumber_(payload.order)||999, ShowOnDashboard:payload.showOnDashboard?'true':'false', Status:'Active' }));
    if (error) throw error;
    return { success:true, message:'Account added.', id:id };
  },

  async mmUpdateAccount(payload) {
    var up = {};
    if (payload.name!==undefined) up.Name=normalize_(payload.name);
    if (payload.icon!==undefined) up.Icon=normalize_(payload.icon);
    if (payload.initialBalance!==undefined) up.InitialBalance=toNumber_(payload.initialBalance);
    if (payload.order!==undefined) up.Order=toNumber_(payload.order);
    if (payload.showOnDashboard!==undefined) up.ShowOnDashboard=payload.showOnDashboard?'true':'false';
    var { error } = await _sb.from('mm_accounts').update(mapRowToDb(up)).eq('accountid',payload.id);
    if (error) throw error;
    return { success:true, message:'Account updated.' };
  },

  async mmDeleteAccount(accountId) {
    var { error } = await _sb.from('mm_accounts').update({status:'Deleted'}).eq('accountid',accountId);
    if (error) throw error;
    return { success:true, message:'Account deleted.' };
  },

  async mmGetCategories() {
    var rows = await getRows_('mm_categories');
    return rows.filter(function(r){return normalize_(r.Status||'Active')!=='Deleted';}).map(function(r){return{type:normalize_(r.Type),category:normalize_(r.Category),subcategory:normalize_(r.Subcategory)};});
  },

  async mmAddCategory(payload) {
    var { error } = await _sb.from('mm_categories').insert(mapRowToDb({ Type:normalize_(payload.type), Category:normalize_(payload.category), Subcategory:normalize_(payload.subcategory)||'', Status:'Active' }));
    if (error) throw error;
    return { success:true, message:'Category added.' };
  },

  async mmDeleteCategory(payload) {
    var { error } = await _sb.from('mm_categories').update({status:'Deleted'}).eq('type',normalize_(payload.type)).eq('category',normalize_(payload.category)).eq('subcategory',normalize_(payload.subcategory||''));
    if (error) throw error;
    return { success:true, message:'Category deleted.' };
  },

  async mmGetAllocation() {
    var rows = await getRows_('mm_allocation');
    if (!rows.length) return [{category:'Living',percent:50,icon:'🏠',color:'#10b981'},{category:'Playing',percent:20,icon:'🎮',color:'#f59e0b'},{category:'Alms',percent:10,icon:'🤲',color:'#ec4899'},{category:'Invest',percent:20,icon:'📈',color:'#3b82f6'}];
    return rows.map(function(r){return{category:normalize_(r.Category),percent:toNumber_(r.Percent),icon:normalize_(r.Icon)||'',color:normalize_(r.Color)||''};});
  },

  async mmSaveAllocation(payload) {
    var items = payload.items || [];
    var total = items.reduce(function(s,i){return s+toNumber_(i.percent);},0);
    if (Math.abs(total-100)>0.01) throw new Error('Total must be 100%. Current: '+total+'%');
    var { error: delError } = await _sb.from('mm_allocation').delete().neq('category','');
    if (delError) throw delError;
    var values = items.map(function(i){return mapRowToDb({Category:normalize_(i.category),Percent:toNumber_(i.percent),Icon:normalize_(i.icon)||'',Color:normalize_(i.color)||''});});
    if (values.length>0) { var { error: insError } = await _sb.from('mm_allocation').insert(values); if (insError) throw insError; }
    return { success:true, message:'Allocation saved.' };
  },

  async mmAddTransaction(payload) {
    var type=normalize_(payload.type),account=normalize_(payload.account),accountTo=normalize_(payload.accountTo)||'',amount=toNumber_(payload.amount);
    var category=(type==='Transfer'&&accountTo.startsWith('Invest:'))?'Invest':normalize_(payload.category)||'';
    var { error } = await _sb.from('mm_transactions').insert(mapRowToDb({Date:payload.date,Type:type,Account:account,AccountTo:accountTo,Category:category,Subcategory:normalize_(payload.subcategory)||'',Amount:amount,Notes:normalize_(payload.notes)||'',Status:'Active'}));

// Apps Script Runner Mock (intercepts google.script.run)
function AppsScriptMockRunner(successCb, failureCb) { this.successCb = successCb; this.failureCb = failureCb; }
AppsScriptMockRunner.prototype.withSuccessHandler = function(cb) { this.successCb = cb; return this; };
AppsScriptMockRunner.prototype.withFailureHandler = function(cb) { this.failureCb = cb; return this; };

var runnerProxyHandler = {
  get: function(runner, methodName) {
    if (methodName in runner) return runner[methodName];
    return async function() {
      var args = arguments;
      try {
        if (!DB_API[methodName]) throw new Error('Function "' + methodName + '" is not implemented in the Supabase adapter.');
        var result = await DB_API[methodName].apply(DB_API, args);
        if (runner.successCb) runner.successCb(result);
      } catch (err) {
        console.error('Error executing ' + methodName + ':', err);
        if (runner.failureCb) runner.failureCb(err);
        else if (typeof showToast === 'function') showToast('Error: ' + (err.message || err), 'error');
      }
    };
  }
};

function createRunner(successCb, failureCb) {
  return new Proxy(new AppsScriptMockRunner(successCb, failureCb), runnerProxyHandler);
}

// Create global window.google object
window.google = {
  script: {
    run: new Proxy({}, {
      get: function(target, prop) {
        if (prop === 'withSuccessHandler') return function(cb) { return createRunner(cb, null); };
        if (prop === 'withFailureHandler') return function(cb) { return createRunner(null, cb); };
        return async function() {
          try { if (!DB_API[prop]) throw new Error('Function "'+prop+'" is not implemented.'); await DB_API[prop].apply(DB_API, arguments); }
          catch(err) { console.error(err); if (typeof showToast === 'function') showToast('Error: '+(err.message||err),'error'); }
        };
      }
    })
  }
};

// INITIALIZATION & WIZARD
// ============================================================
function initSupabaseClient() {
  var creds = getSupabaseCredentials();
  if (creds.url && creds.key) {
    _sb = window.supabase.createClient(creds.url, creds.key, {
      auth: {
        persistSession: false
      }
    });
    window.supabaseConnected = true;
    return true;
  }
  window.supabaseConnected = false;
  return false;
}

function saveSupabaseSettingsForm(event) {
  event.preventDefault();
  var url = document.getElementById('supabaseSettingsUrl').value.trim();
  var key = document.getElementById('supabaseSettingsKey').value.trim();
  safeStorage.setItem('supabase_url', url);
  safeStorage.setItem('supabase_key', key);
  if (typeof showToast === 'function') showToast('Supabase settings saved! Reloading...', 'success');
  setTimeout(function() { window.location.reload(); }, 1000);
}

function resetSupabaseSettings() {
  if (confirm('Apakah Anda yakin ingin memutuskan koneksi database? Data tidak akan hilang di Supabase, tapi Anda harus memasukkan URL & Anon Key lagi.')) {
    safeStorage.removeItem('supabase_url');
    safeStorage.removeItem('supabase_key');
    window.location.reload();
  }
}

function injectSupabaseSettingsCard() {
  var settingsPage = document.getElementById('settingsPage');
  if (!settingsPage) return;
  var currentUrl = safeStorage.getItem('supabase_url') || '';
  var currentKey = safeStorage.getItem('supabase_key') || '';
  var cardHtml = '<section class="panel-card"><button class="panel-toggle" onclick="togglePanel(\'supabaseSettingsPanel\')"><div><p class="panel-eyebrow">Database</p><h3 class="panel-title">Supabase connection</h3></div><strong class="panel-chevron" id="supabaseSettingsChevron">↓</strong></button><div id="supabaseSettingsPanel" class="panel-body hidden"><form class="stack-form" onsubmit="saveSupabaseSettingsForm(event)" style="display:flex;flex-direction:column;gap:12px;"><label class="form-label" style="display:flex;flex-direction:column;gap:4px;font-size:12px;font-weight:600;">Supabase URL<input type="url" id="supabaseSettingsUrl" class="form-input" value="'+currentUrl+'" required placeholder="https://yourproject.supabase.co" style="width:100%;padding:8px;border-radius:4px;border:1px solid var(--border);background:rgba(255,255,255,0.02);color:#fff;"></label><label class="form-label" style="display:flex;flex-direction:column;gap:4px;font-size:12px;font-weight:600;">Supabase Anon Key<input type="password" id="supabaseSettingsKey" class="form-input" value="'+currentKey+'" required placeholder="Anon Key" style="width:100%;padding:8px;border-radius:4px;border:1px solid var(--border);background:rgba(255,255,255,0.02);color:#fff;"></label><div style="display:flex;gap:8px;margin-top:8px;"><button class="btn-primary" type="submit" style="flex:1;">Update Connection</button><button class="btn-ghost" type="button" onclick="resetSupabaseSettings()" style="color:var(--error);border-color:var(--error);">Disconnect</button></div></form></div></section>';
  var headerCard = settingsPage.querySelector('.page-header-card');
  if (headerCard) headerCard.insertAdjacentHTML('afterend', cardHtml);
}

// BOOTSTRAPPER — runs immediately
(function() {
  function boot() {
    initSupabaseClient();
    setTimeout(injectSupabaseSettingsCard, 300);
    if (typeof initApp === 'function') {
      initApp();
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>
