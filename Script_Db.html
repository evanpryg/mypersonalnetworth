<script>
// ====================================================================
// CONFIG CONFIGURATION MANUAL (MANUAL supabaseClient SETUP)
// ====================================================================
// Paste your supabaseClient credentials here to connect your database directly:
const HARDCODED_SUPABASE_URL = ""; // e.g. "https://vycpefzdpsfsiczdlvbg.supabaseClient.co"
const HARDCODED_SUPABASE_KEY = ""; // e.g. "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5Y3BlZnpkcHNmc2ljemRsdmJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NzQxODcsImV4cCI6MjA5ODQ1MDE4N30.upr6L-vw0cr0vAlS_m6pGMbZHtNswKQTwJDWY4KoB-I"
// ====================================================================

let supabaseClient = null;

function getSupabaseCredentials() {
  const url = HARDCODED_SUPABASE_URL || localStorage.getItem('supabase_url');
  const key = HARDCODED_SUPABASE_KEY || localStorage.getItem('supabase_key');
  return { url, key };
}

// Case-insensitive key mapper dictionaries to bridge PostgreSQL and frontend logic
const KEY_MAP = {
  'id': 'id',
  'timestamp': 'Timestamp',
  'date': 'Date',
  'notes': 'Notes',
  'status': 'Status',
  'targetid': 'TargetID',
  'targetname': 'TargetName',
  'targetamount': 'TargetAmount',
  'targetcurrency': 'TargetCurrency',
  'startdate': 'StartDate',
  'platform': 'Platform',
  'sector': 'Sector',
  'asset': 'Asset',
  'transactiontype': 'TransactionType',
  'amountidr': 'AmountIDR',
  'currentvalueidr': 'CurrentValueIDR',
  'key': 'Key',
  'value': 'Value',
  'targetpercent': 'TargetPercent',
  'accountid': 'AccountID',
  'name': 'Name',
  'icon': 'Icon',
  'initialbalance': 'InitialBalance',
  'order': 'Order',
  'showondashboard': 'ShowOnDashboard',
  'type': 'Type',
  'account': 'Account',
  'accountto': 'AccountTo',
  'category': 'Category',
  'subcategory': 'Subcategory',
  'amount': 'Amount',
  'percent': 'Percent',
  'color': 'Color'
};

function mapRowToFrontend(row) {
  if (!row) return row;
  const mapped = {};
  for (let k in row) {
    const targetKey = KEY_MAP[k.toLowerCase()] || k;
    mapped[targetKey] = row[k];
  }
  return mapped;
}

function mapRowToDb(row) {
  if (!row) return row;
  const mapped = {};
  for (let k in row) {
    mapped[k.toLowerCase()] = row[k];
  }
  return mapped;
}

// Helpers:
function normalize_(value) {
  return String(value || '').trim();
}
function normalizeUpper_(value) {
  return normalize_(value).toUpperCase();
}
function toNumber_(value) {
  const number = Number(value);
  return isNaN(number) ? 0 : number;
}
function makeAssetKey_(platform, sector, asset) {
  return [
    normalizeUpper_(platform),
    normalizeUpper_(sector),
    normalizeUpper_(asset)
  ].join('|');
}
function getCashAssetName_(platform) {
  return `${normalize_(platform)} Cash`;
}
function formatDateForClient_(value) {
  if (!value) return '';
  const d = new Date(value);
  if (isNaN(d.getTime())) return String(value);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dateStr = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dateStr}`;
}
function formatTimestampForClient_(value) {
  if (!value) return '';
  const d = new Date(value);
  if (isNaN(d.getTime())) return String(value);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dateStr = String(d.getDate()).padStart(2, '0');
  const h = String(d.getHours()).padStart(2, '0');
  const mi = String(d.getMinutes()).padStart(2, '0');
  const s = String(d.getSeconds()).padStart(2, '0');
  return `${y}-${m}-${dateStr} ${h}:${mi}:${s}`;
}

// 1. Get raw rows from supabaseClient (auto-mapped to frontend keys)
async function getRows_(tableName) {
  if (!supabaseClient) throw new Error("supabaseClient is not initialized.");
  const { data, error } = await supabaseClient.from(tableName.toLowerCase()).select('*');
  if (error) {
    console.error(`Error reading ${tableName}:`, error);
    throw error;
  }
  // Map database lowercase keys to frontend case-sensitive keys
  const mappedData = data.map(mapRowToFrontend);
  
  // Parse date fields
  const dateFields = ['Timestamp', 'Date', 'StartDate'];
  mappedData.forEach(row => {
    dateFields.forEach(field => {
      if (row[field] && typeof row[field] === 'string') {
        row[field] = new Date(row[field]);
      }
    });
  });
  return mappedData;
}

// Ported Database API Methods
const DB_API = {
  // SETTINGS
  async getSettings() {
    const rows = await getRows_('settings');
    const settings = {};
    rows.forEach(row => {
      const key = normalize_(row.Key);
      const value = normalize_(row.Value);
      if (!key || !value) return;
      if (!settings[key]) settings[key] = [];
      if (!settings[key].includes(value)) settings[key].push(value);
    });
    return settings;
  },

  async addSettingItem(payload) {
    const key = normalize_(payload.key);
    const value = normalize_(payload.value);
    if (!key || !value) throw new Error('Key and value are required.');
    
    // Check duplication
    const rows = await getRows_('settings');
    const exists = rows.some(row => normalizeUpper_(row.Key) === normalizeUpper_(key) && normalizeUpper_(row.Value) === normalizeUpper_(value));
    if (exists) {
      return { success: false, message: `${value} already exists in ${key}.` };
    }
    
    const { error } = await supabaseClient.from('settings').insert(mapRowToDb({ Key: key, Value: value }));
    if (error) throw error;
    return { success: true, message: `${value} added to ${key}.` };
  },

  // TARGETS
  async getMainTarget_() {
    const targets = await getRows_('targets');
    if (targets.length === 0) {
      return {
        TargetID: 'T001',
        TargetName: 'First 100 Million',
        TargetAmount: 100000000,
        TargetCurrency: 'IDR',
        StartDate: '',
        Notes: ''
      };
    }
    return targets[0];
  },

  async updateMainTarget(payload) {
    const targetName = normalize_(payload.targetName);
    const targetAmount = toNumber_(payload.targetAmount);
    const targetCurrency = normalizeUpper_(payload.targetCurrency || 'IDR');
    const notes = normalize_(payload.notes);

    if (!targetName) throw new Error('Target name is required.');
    if (targetAmount <= 0) throw new Error('Target amount must be greater than 0.');

    const targets = await getRows_('targets');
    if (targets.length === 0) {
      const { error } = await supabaseClient.from('targets').insert(mapRowToDb({
        TargetID: 'T001',
        TargetName: targetName,
        TargetAmount: targetAmount,
        TargetCurrency: targetCurrency,
        StartDate: new Date(),
        Notes: notes
      }));
      if (error) throw error;
    } else {
      const { error } = await supabaseClient.from('targets').update(mapRowToDb({
        TargetName: targetName,
        TargetAmount: targetAmount,
        TargetCurrency: targetCurrency,
        Notes: notes
      })).eq('targetid', targets[0].TargetID);
      if (error) throw error;
    }
    return { success: true, message: 'Main target updated successfully.' };
  },

  // PORTFOLIO
  async getPortfolioSheet_() {
    const rows = await getRows_('portfolio');
    const values = {};
    rows.forEach(row => {
      const platform = normalize_(row.Platform);
      const sector = normalize_(row.Sector);
      const asset = normalize_(row.Asset);
      const currentValueIDR = toNumber_(row.CurrentValueIDR);
      if (!platform || !sector || !asset) return;
      const key = makeAssetKey_(platform, sector, asset);
      values[key] = currentValueIDR;
    });
    return values;
  },

  async updateAssetValue(payload) {
    const platform = normalize_(payload.platform);
    const sector = normalize_(payload.sector);
    const asset = normalize_(payload.asset);
    const currentValueIDR = toNumber_(payload.currentValueIDR);

    if (!platform || !sector || !asset) throw new Error('Platform, Sector, and Asset are required.');

    const { error } = await supabaseClient.from('portfolio').upsert(mapRowToDb({
      Platform: platform,
      Sector: sector,
      Asset: asset,
      CurrentValueIDR: currentValueIDR
    }));
    if (error) throw error;
    return { success: true, message: 'Asset value updated successfully.' };
  },

  // ALLOCATION TARGETS (INVESTMENT)
  async getAllocationTargets() {
    const rows = await getRows_('allocation_targets');
    return rows
      .filter(row => normalize_(row.Sector))
      .map(row => ({
        sector: normalize_(row.Sector),
        targetPercent: toNumber_(row.TargetPercent)
      }));
  },

  async getAllocationTargets_() {
    const rows = await getRows_('allocation_targets');
    const targets = {};
    rows.forEach(row => {
      const sector = normalize_(row.Sector);
      const targetPercent = toNumber_(row.TargetPercent);
      if (!sector || targetPercent <= 0) return;
      targets[sector] = targetPercent;
    });
    return targets;
  },

  async saveAllocationTargets(payload) {
    const items = payload.items || [];
    const cleanedItems = items
      .map(item => ({
        sector: normalize_(item.sector),
        targetPercent: toNumber_(item.targetPercent)
      }))
      .filter(item => item.sector && item.targetPercent >= 0);

    const total = cleanedItems.reduce((sum, item) => sum + item.targetPercent, 0);

    if (cleanedItems.length === 0) throw new Error('Allocation target cannot be empty.');
    if (Math.abs(total - 100) > 0.01) throw new Error(`Total allocation must be 100%. Current total is ${total}%.`);

    // Truncate and replace
    const { error: delError } = await supabaseClient.from('allocation_targets').delete().neq('sector', '');
    if (delError) throw delError;

    const { error: insError } = await supabaseClient.from('allocation_targets').insert(cleanedItems.map(item => mapRowToDb({
      Sector: item.sector,
      TargetPercent: item.targetPercent
    })));
    if (insError) throw insError;

    return { success: true, message: 'Allocation targets saved successfully.' };
  },

  // DASHBOARD DATA
  async getDashboardData() {
    const target = await this.getMainTarget_();
    const allTransactions = await getRows_('transactions');
    const transactions = allTransactions.filter(row => normalize_(row.Status || 'Active') !== 'Deleted');
    const persistedValues = await this.getPortfolioSheet_();
    const allocationTargets = await this.getAllocationTargets_();

    const portfolioMap = {};

    function ensurePortfolioItem_(portfolioMap, platform, sector, asset) {
      const key = makeAssetKey_(platform, sector, asset);
      if (!portfolioMap[key]) {
        portfolioMap[key] = {
          Platform: normalize_(platform),
          Sector: normalize_(sector),
          Asset: normalize_(asset),
          TotalCapitalIDR: 0,
          CurrentValueIDR: 0,
          ProfitLossIDR: 0,
          GrowthPercent: 0
        };
      }
      return portfolioMap[key];
    }

    function addCashMovement_(portfolioMap, platform, amountIDR) {
      const cashItem = ensurePortfolioItem_(portfolioMap, platform, 'Cash', getCashAssetName_(platform));
      cashItem.TotalCapitalIDR += amountIDR;
    }

    transactions.forEach(row => {
      const platform = normalize_(row.Platform);
      const sector = normalize_(row.Sector);
      const asset = normalize_(row.Asset);
      const type = normalize_(row.TransactionType);
      if (!platform || !type) return;

      const amountIDR = toNumber_(row.AmountIDR);

      if (type === 'Buy') {
        if (!sector || !asset) return;
        const item = ensurePortfolioItem_(portfolioMap, platform, sector, asset);
        item.TotalCapitalIDR += amountIDR;
        addCashMovement_(portfolioMap, platform, -amountIDR);
      } else if (type === 'Sell') {
        if (!sector || !asset) return;
        const item = ensurePortfolioItem_(portfolioMap, platform, sector, asset);
        item.TotalCapitalIDR -= amountIDR;
        addCashMovement_(portfolioMap, platform, amountIDR);
      } else if (type === 'Deposit') {
        addCashMovement_(portfolioMap, platform, amountIDR);
      } else if (type === 'Withdraw') {
        addCashMovement_(portfolioMap, platform, -amountIDR);
      } else if (type === 'Initial Holding') {
        if (!sector || !asset) return;
        const item = ensurePortfolioItem_(portfolioMap, platform, sector, asset);
        item.TotalCapitalIDR += amountIDR;
      } else if (type === 'Cash Adjustment') {
        addCashMovement_(portfolioMap, platform, amountIDR);
      }
    });

    const portfolio = Object.values(portfolioMap).map(item => {
      const key = makeAssetKey_(item.Platform, item.Sector, item.Asset);
      if (item.Sector === 'Cash') {
        item.CurrentValueIDR = item.TotalCapitalIDR;
        item.ProfitLossIDR = 0;
        item.GrowthPercent = 0;
        return item;
      }

      if (persistedValues[key] !== undefined) {
        item.CurrentValueIDR = persistedValues[key];
      } else {
        item.CurrentValueIDR = item.TotalCapitalIDR;
      }

      item.ProfitLossIDR = item.CurrentValueIDR - item.TotalCapitalIDR;
      item.GrowthPercent = item.TotalCapitalIDR > 0 ? item.ProfitLossIDR / item.TotalCapitalIDR : 0;
      return item;
    });

    const investedAssets = portfolio.filter(item => item.Sector !== 'Cash');
    const cashItems = portfolio.filter(item => item.Sector === 'Cash');

    const totalInvestedAssetsIDR = investedAssets.reduce((sum, item) => sum + item.CurrentValueIDR, 0);
    const totalCashIDR = cashItems.reduce((sum, item) => sum + item.CurrentValueIDR, 0);
    const totalPortfolioValueIDR = totalInvestedAssetsIDR + totalCashIDR;

    const totalCapitalIDR = investedAssets.reduce((sum, item) => sum + item.TotalCapitalIDR, 0);
    const totalProfitLossIDR = investedAssets.reduce((sum, item) => sum + item.ProfitLossIDR, 0);

    const targetAmount = toNumber_(target.TargetAmount) || 100000000;
    const progressPercent = targetAmount > 0 ? totalPortfolioValueIDR / targetAmount : 0;
    const remainingAmountIDR = Math.max(targetAmount - totalPortfolioValueIDR, 0);

    const averageMonthlyInvestmentIDR = (function(transactions) {
      const monthly = {};
      transactions.forEach(row => {
        const type = normalize_(row.TransactionType);
        if (!['Initial Holding', 'Deposit'].includes(type)) return;
        const date = row.Date;
        if (!date) return;
        const d = new Date(date);
        if (isNaN(d.getTime())) return;
        const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        const amountIDR = toNumber_(row.AmountIDR);
        if (!monthly[key]) monthly[key] = 0;
        monthly[key] += amountIDR;
      });
      const values = Object.values(monthly);
      if (values.length === 0) return 0;
      return values.reduce((sum, value) => sum + value, 0) / values.length;
    })(transactions);

    const estimatedMonthsLeft = averageMonthlyInvestmentIDR > 0 ? Math.ceil(remainingAmountIDR / averageMonthlyInvestmentIDR) : null;

    // Sector allocation
    const sectorMap = {};
    portfolio.forEach(item => {
      if (!sectorMap[item.Sector]) sectorMap[item.Sector] = 0;
      sectorMap[item.Sector] += item.CurrentValueIDR;
    });
    const totalSectorVal = Object.values(sectorMap).reduce((sum, v) => sum + v, 0);
    const allocationBySector = Object.keys(sectorMap).map(sector => {
      const valueIDR = sectorMap[sector];
      const actualPercent = totalSectorVal > 0 ? (valueIDR / totalSectorVal) * 100 : 0;
      const targetPercent = allocationTargets[sector] || 0;
      const difference = actualPercent - targetPercent;
      let status = 'No Target';
      if (targetPercent > 0) {
        if (Math.abs(difference) <= 3) status = 'Balanced';
        else if (difference > 3) status = 'Overweight';
        else status = 'Underweight';
      }
      return { sector, valueIDR, actualPercent, targetPercent, difference, status };
    });

    const cashByPlatform = cashItems.map(item => ({
      platform: item.Platform,
      asset: item.Asset,
      cashBalanceIDR: item.CurrentValueIDR
    }));

    // Rebalance suggestions
    const rebalanceSuggestions = (function(allocationBySector, totalCashIDR) {
      if (!allocationBySector || allocationBySector.length === 0 || totalCashIDR <= 0) return [];
      const underweightItems = allocationBySector
        .filter(item => item.sector !== 'Cash' && item.status === 'Underweight')
        .map(item => ({
          sector: item.sector,
          actualPercent: Number(item.actualPercent) || 0,
          targetPercent: Number(item.targetPercent) || 0,
          gapPercent: Math.abs(Number(item.difference) || 0)
        }))
        .filter(item => item.gapPercent > 0);

      if (underweightItems.length === 0) return [];
      const totalGap = underweightItems.reduce((sum, item) => sum + item.gapPercent, 0);
      return underweightItems.map(item => {
        const portion = totalGap > 0 ? item.gapPercent / totalGap : 0;
        const suggestedAmountIDR = totalCashIDR * portion;
        return { sector: item.sector, actualPercent: item.actualPercent, targetPercent: item.targetPercent, gapPercent: item.gapPercent, portion, suggestedAmountIDR };
      }).sort((a, b) => b.suggestedAmountIDR - a.suggestedAmountIDR);
    })(allocationBySector, totalCashIDR);

    return {
      target: { name: target.TargetName || 'First 100 Million', amount: targetAmount, currency: target.TargetCurrency || 'IDR' },
      summary: { totalPortfolioValueIDR, totalInvestedAssetsIDR, totalCashIDR, totalCapitalIDR, totalProfitLossIDR, progressPercent, remainingAmountIDR, averageMonthlyInvestmentIDR, estimatedMonthsLeft },
      allocationTargets, allocationBySector, cashByPlatform, rebalanceSuggestions, portfolio
    };
  },

  async addTransaction(payload) {
    const platform = normalize_(payload.platform);
    const transactionType = normalize_(payload.transactionType);
    const amountIDR = toNumber_(payload.amountIDR);
    let sector = normalize_(payload.sector);
    let asset = normalize_(payload.asset);

    if (transactionType === 'Deposit' || transactionType === 'Withdraw') {
      sector = 'Cash';
      asset = getCashAssetName_(platform);
    }

    const { error } = await supabaseClient.from('transactions').insert(mapRowToDb({
      Date: payload.date,
      Platform: platform,
      Sector: sector,
      Asset: asset,
      TransactionType: transactionType,
      AmountIDR: amountIDR,
      Notes: payload.notes || '',
      Status: 'Active'
    }));
    if (error) throw error;
    return { success: true, message: 'Transaction added successfully.' };
  },

  async syncCashBalance(payload) {
    const platform = normalize_(payload.platform);
    const actualBalance = toNumber_(payload.actualBalance);
    const notes = normalize_(payload.notes) || 'Balance sync';

    if (!platform) throw new Error('Platform is required.');

    const dashData = await this.getDashboardData();
    const cashItem = dashData.portfolio.find(item => item.Sector === 'Cash' && item.Platform === platform);
    const currentCash = cashItem ? cashItem.CurrentValueIDR : 0;
    const difference = actualBalance - currentCash;

    if (Math.abs(difference) < 1) {
      return { success: true, message: 'Balance already in sync.' };
    }

    const todayStr = new Date().toISOString().slice(0, 10);
    const { error } = await supabaseClient.from('transactions').insert(mapRowToDb({
      Date: todayStr,
      Platform: platform,
      Sector: 'Cash',
      Asset: getCashAssetName_(platform),
      TransactionType: 'Cash Adjustment',
      AmountIDR: difference,
      Notes: notes,
      Status: 'Active'
    }));
    if (error) throw error;

    return { success: true, message: `Balance synced. Adjusted ${difference >= 0 ? '+' : ''}${difference.toLocaleString('id-ID')}.` };
  },

  async getAssetOptions() {
    const dashboardData = await this.getDashboardData();
    return dashboardData.portfolio
      .filter(item => item.Sector !== 'Cash' && item.TotalCapitalIDR > 0)
      .map(item => ({
        platform: item.Platform,
        sector: item.Sector,
        asset: item.Asset,
        currentValueIDR: item.CurrentValueIDR
      }))
      .sort((a, b) => a.platform.localeCompare(b.platform) || a.sector.localeCompare(b.sector) || a.asset.localeCompare(b.asset));
  },

  async getHistoryData() {
    const raw = await getRows_('transactions');
    const transactions = raw
      .map(row => ({
        rowNumber: row.id, // supabaseClient id serves as rowNumber
        timestamp: formatTimestampForClient_(row.Timestamp),
        date: formatDateForClient_(row.Date),
        platform: row.Platform || '',
        sector: row.Sector || '',
        asset: row.Asset || '',
        transactionType: row.TransactionType || '',
        amountIDR: toNumber_(row.AmountIDR),
        notes: row.Notes || '',
        status: row.Status || 'Active'

  async mmSaveAllocation(payload) {

      Category: normalize_(i.category),
      Percent: toNumber_(i.percent),
      Icon: normalize_(i.icon) || '',
      Color: normalize_(i.color) || ''

    if (values.length > 0) {

      if (insError) throw insError;

  // --- MM Transactions ---
  async mmAddTransaction(payload) {
    const type = normalize_(payload.type);
    const account = normalize_(payload.account);
    const accountTo = normalize_(payload.accountTo) || '';
    const amount = toNumber_(payload.amount);
    const category = (type === 'Transfer' && accountTo.startsWith('Invest:')) ? 'Invest' : normalize_(payload.category) || '';

    const { error } = await supabaseClient.from('mm_transactions').insert(mapRowToDb({
      Date: payload.date,
      Type: type,
      Account: account,
      AccountTo: accountTo,
      Category: category,
      Subcategory: normalize_(payload.subcategory) || '',
      Amount: amount,
      Notes: normalize_(payload.notes) || '',
      Status: 'Active'
    }));
    if (error) throw error;

    // Cross-workspace: Transfer to Investment Platform
    if (type === 'Transfer' && accountTo.startsWith('Invest:')) {
      const platform = accountTo.replace('Invest:', '');
      await this.addTransaction({
        date: payload.date,
        platform: platform,
        sector: 'Cash',
        asset: getCashAssetName_(platform),
        amountIDR: amount,
        transactionType: 'Deposit',
        notes: `Transfer from ${account}`
      });
    }

    // Cross-workspace: Transfer from Investment Platform to MM account
    if (type === 'Transfer' && account.startsWith('Invest:')) {
      const platform = account.replace('Invest:', '');
      await this.addTransaction({
        date: payload.date,
        platform: platform,
        sector: 'Cash',
        asset: getCashAssetName_(platform),
        amountIDR: amount,
        transactionType: 'Withdraw',
        notes: `Transfer to ${accountTo}`
      });
    }

    return { success: true, message: 'Transaction saved.' };
  },

  // --- MM Dashboard ---
  async mmGetDashboard() {
    const accounts = await this.mmGetAccounts();
    const allTransactions = await this.mmGetTransactions({});
    const allocation = await this.mmGetAllocation();

    const balances = {};
    accounts.forEach(acc => { balances[acc.name] = acc.initialBalance; });

    allTransactions.slice().reverse().forEach(tx => {
      if (tx.type === 'Income') {
        balances[tx.account] = (balances[tx.account] || 0) + tx.amount;
      } else if (tx.type === 'Expense') {
        balances[tx.account] = (balances[tx.account] || 0) - tx.amount;
      } else if (tx.type === 'Transfer') {
        balances[tx.account] = (balances[tx.account] || 0) - tx.amount;
        balances[tx.accountTo] = (balances[tx.accountTo] || 0) + tx.amount;
      }
    });

    let netWorth = 0;
    accounts.forEach(acc => {
      if (acc.showOnDashboard) netWorth += balances[acc.name] || 0;
    });

    const now = new Date();
    const monthStartStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
    const monthTransactions = allTransactions.filter(tx => tx.date >= monthStartStr);

    let totalIncome = 0, totalExpense = 0;
    const categoryExpenses = {};
    allocation.forEach(a => { categoryExpenses[a.category] = 0; });

    monthTransactions.forEach(tx => {
      if (tx.type === 'Income') totalIncome += tx.amount;
      if (tx.type === 'Expense') {
        totalExpense += tx.amount;
        if (categoryExpenses[tx.category] !== undefined) categoryExpenses[tx.category] += tx.amount;
      }
      if (tx.type === 'Transfer' && tx.category === 'Invest') {
        if (categoryExpenses['Invest'] !== undefined) categoryExpenses['Invest'] += tx.amount;
      }
    });

    const saving = totalIncome - totalExpense;
    const allocationCards = allocation.map(a => {
      const target = totalIncome * (a.percent / 100);
      const spent = categoryExpenses[a.category] || 0;
      const progress = target > 0 ? Math.min(spent / target, 1) : 0;
      return { category: a.category, percent: a.percent, spent, target, progress };
    });

    return {
      accounts: accounts.map(acc => ({ ...acc, balance: balances[acc.name] || 0 })),
      netWorth, totalIncome, totalExpense, saving, allocationCards, monthTransactions, allocation
    };
  },

  async mmGetMonthlySummary(year, month) {
    const startDate = `${year}-${String(month).padStart(2,'0')}-01`;
    const endDay = new Date(year, month, 0).getDate();
    const endDate = `${year}-${String(month).padStart(2,'0')}-${String(endDay).padStart(2,'0')}`;

    const transactions = await this.mmGetTransactions({ startDate, endDate });
    let totalIncome = 0, totalExpense = 0;
    const categoryBreakdown = {};

    transactions.forEach(tx => {
      if (tx.type === 'Income') totalIncome += tx.amount;
      if (tx.type === 'Expense') {
        totalExpense += tx.amount;
        const cat = tx.category || 'Other';
        const sub = tx.subcategory || 'General';
        if (!categoryBreakdown[cat]) categoryBreakdown[cat] = { total: 0, subs: {} };
        categoryBreakdown[cat].total += tx.amount;
        if (!categoryBreakdown[cat].subs[sub]) categoryBreakdown[cat].subs[sub] = 0;
        categoryBreakdown[cat].subs[sub] += tx.amount;
      }
    });

    return { totalIncome, totalExpense, saving: totalIncome - totalExpense, categoryBreakdown, transactions };
  },

  async mmGetAllTimeSummary() {
    const transactions = await this.mmGetTransactions({});
    const monthly = {};

    transactions.forEach(tx => {
      const d = new Date(tx.date);
      if (isNaN(d.getTime())) return;
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if (!monthly[key]) monthly[key] = { income: 0, expense: 0 };
      if (tx.type === 'Income') monthly[key].income += tx.amount;
      if (tx.type === 'Expense') monthly[key].expense += tx.amount;
    });

    return Object.entries(monthly)
      .sort(([a],[b]) => a.localeCompare(b))
      .map(([month, data]) => ({
        month, income: data.income, expense: data.expense, saving: data.income - data.expense
      }));
  },

  async mmGetCalendarData(year, month) {
    const startDate = `${year}-${String(month).padStart(2,'0')}-01`;
    const endDay = new Date(year, month, 0).getDate();
    const endDate = `${year}-${String(month).padStart(2,'0')}-${String(endDay).padStart(2,'0')}`;

    const transactions = await this.mmGetTransactions({ startDate, endDate });

    const days = {};
    for (let d = 1; d <= endDay; d++) {
      days[d] = { income: 0, expense: 0, transactions: [] };
    }

    transactions.forEach(tx => {
      const d = new Date(tx.date);
      if (isNaN(d.getTime())) return;
      const day = d.getDate();
      if (days[day]) {
        if (tx.type === 'Income') days[day].income += tx.amount;
        if (tx.type === 'Expense') days[day].expense += tx.amount;
        days[day].transactions.push(tx);
      }
    });

    return { year, month, endDay, days };
  },

  async mmGetSubcategories(category) {
    const categories = await this.mmGetCategories();
    return categories
      .filter(c => c.type === 'Expense' && c.category === category && c.subcategory)
      .map(c => c.subcategory);

  async mmGetCategoryExpenseDetail(category) {
    const now = new Date();
    const startDate = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
    const transactions = await this.mmGetTransactions({ startDate });

    const subs = {};
    transactions.forEach(tx => {
      if (tx.type === 'Expense' && tx.category === category) {
        const sub = tx.subcategory || 'General';
        if (!subs[sub]) subs[sub] = 0;
        subs[sub] += tx.amount;
      }
    });

    return Object.entries(subs)
      .map(([subcategory, amount]) => ({ subcategory, amount }))
      .sort((a, b) => b.amount - a.amount);
  },

  // --- Financial Insight ---
  async mmGetFinancialInsight() {
    const accounts = await this.mmGetAccounts();
    const allTransactions = await this.mmGetTransactions({});
    const allocation = await this.mmGetAllocation();
    const now = new Date();
    const currentYear = now.getFullYear();
    const currentMonth = now.getMonth() + 1;

    // Balances
    const balances = {};
    accounts.forEach(acc => { balances[acc.name] = acc.initialBalance; });
    allTransactions.slice().reverse().forEach(tx => {
      if (tx.type === 'Income') balances[tx.account] = (balances[tx.account] || 0) + tx.amount;
      else if (tx.type === 'Expense') balances[tx.account] = (balances[tx.account] || 0) - tx.amount;
      else if (tx.type === 'Transfer') {
        balances[tx.account] = (balances[tx.account] || 0) - tx.amount;
        balances[tx.accountTo] = (balances[tx.accountTo] || 0) + tx.amount;
      }
    });

    let netWorth = 0;
    accounts.forEach(acc => {
      if (acc.showOnDashboard) netWorth += balances[acc.name] || 0;
    });

    const monthStartStr = `${currentYear}-${String(currentMonth).padStart(2, '0')}-01`;
    const monthTxs = allTransactions.filter(tx => tx.date >= monthStartStr);

    let totalIncome = 0, totalExpense = 0;
    const categoryExpenses = {};
    allocation.forEach(a => { categoryExpenses[a.category] = 0; });

    monthTxs.forEach(tx => {
      if (tx.type === 'Income') totalIncome += tx.amount;
      if (tx.type === 'Expense') {
        totalExpense += tx.amount;
        if (categoryExpenses[tx.category] !== undefined) categoryExpenses[tx.category] += tx.amount;
      }
      if (tx.type === 'Transfer' && tx.category === 'Invest') {
        if (categoryExpenses['Invest'] !== undefined) categoryExpenses['Invest'] += tx.amount;
      }
    });

    const saving = totalIncome - totalExpense;
    const savingRate = totalIncome > 0 ? (saving / totalIncome) * 100 : 0;

    // Prev month
    const prevMonth = currentMonth === 1 ? 12 : currentMonth - 1;
    const prevYear = currentMonth === 1 ? currentYear - 1 : currentYear;
    const prevStartStr = `${prevYear}-${String(prevMonth).padStart(2, '0')}-01`;
    const prevEndDay = new Date(prevYear, prevMonth, 0).getDate();
    const prevEndStr = `${prevYear}-${String(prevMonth).padStart(2, '0')}-${String(prevEndDay).padStart(2, '0')}`;

    const prevTxs = allTransactions.filter(tx => tx.date >= prevStartStr && tx.date <= prevEndStr);
    let prevIncome = 0, prevExpense = 0;
    const prevCategoryExpenses = {};
    allocation.forEach(a => { prevCategoryExpenses[a.category] = 0; });

    prevTxs.forEach(tx => {
      if (tx.type === 'Income') prevIncome += tx.amount;
      if (tx.type === 'Expense') {
        prevExpense += tx.amount;
        if (prevCategoryExpenses[tx.category] !== undefined) prevCategoryExpenses[tx.category] += tx.amount;
      }
      if (tx.type === 'Transfer' && tx.category === 'Invest') {
        if (prevCategoryExpenses['Invest'] !== undefined) prevCategoryExpenses['Invest'] += tx.amount;
      }
    });

    const prevSaving = prevIncome - prevExpense;
    const prevSavingRate = prevIncome > 0 ? (prevSaving / prevIncome) * 100 : 0;

    // Budget analysis
    const budgetAnalysis = allocation.map(a => {
      const target = totalIncome * (a.percent / 100);
      const spent = categoryExpenses[a.category] || 0;
      const progress = target > 0 ? spent / target : 0;
      const prevSpent = prevCategoryExpenses[a.category] || 0;
      const isSaving = (a.category.toLowerCase() === 'invest' || a.category.toLowerCase() === 'saving' || a.category.toLowerCase() === 'tabungan');
      return { category: a.category, percent: a.percent, spent, target, progress, prevSpent, isSaving };
    });

    const spendingByCategory = Object.entries(categoryExpenses)
      .filter(([cat, v]) => v > 0 && cat.toLowerCase() !== 'invest' && cat.toLowerCase() !== 'saving' && cat.toLowerCase() !== 'tabungan')
      .sort((a, b) => b[1] - a[1])
      .map(([category, amount]) => ({
        category, amount, percent: totalExpense > 0 ? (amount / totalExpense) * 100 : 0
      }));

    // Last 6 months history
    const monthlyHistory = [];
    for (let i = 5; i >= 0; i--) {
      const m = new Date(currentYear, currentMonth - 1 - i, 1);
      const y = m.getFullYear();
      const mo = m.getMonth() + 1;
      const startStr = `${y}-${String(mo).padStart(2, '0')}-01`;
      const endDay = new Date(y, mo, 0).getDate();
      const endStr = `${y}-${String(mo).padStart(2, '0')}-${String(endDay).padStart(2, '0')}`;

      let inc = 0, exp = 0;
      allTransactions.forEach(tx => {
        if (tx.date >= startStr && tx.date <= endStr) {
          if (tx.type === 'Income') inc += tx.amount;
          if (tx.type === 'Expense') exp += tx.amount;
        }
      });

      monthlyHistory.push({
        month: `${y}-${String(mo).padStart(2, '0')}`,
        label: new Date(y, mo - 1).toLocaleString('default', { month: 'short', year: '2-digit' }),
        income: inc, expense: exp, saving: inc - exp
      });
    }

    // Investment
    let investmentData = null;
    try {
      const dashData = await this.getDashboardData();
      investmentData = {
        totalValue: dashData.summary.totalPortfolioValueIDR,
        totalCapital: dashData.summary.totalCapitalIDR,
        totalCash: dashData.summary.totalCashIDR,
        profitLoss: dashData.summary.totalProfitLossIDR,
        returnPercent: dashData.summary.totalCapitalIDR > 0 ? (dashData.summary.totalProfitLossIDR / dashData.summary.totalCapitalIDR) * 100 : 0,
        allocationBySector: dashData.allocationBySector || [],
        rebalanceSuggestions: dashData.rebalanceSuggestions || [],
        portfolio: (dashData.portfolio || []).filter(p => p.Sector !== 'Cash' && p.TotalCapitalIDR > 0)
      };
    } catch (e) {
      console.warn("Investment data could not be computed:", e);
    }

    // Predictions
    const dayOfMonth = now.getDate();
    const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
    const remainingDays = daysInMonth - dayOfMonth;

    const dailyIncomeAvg = dayOfMonth > 0 ? totalIncome / dayOfMonth : 0;
    const dailyExpenseAvg = dayOfMonth > 0 ? totalExpense / dayOfMonth : 0;

    const predictedIncome = totalIncome + (dailyIncomeAvg * remainingDays);
    const predictedExpense = totalExpense + (dailyExpenseAvg * remainingDays);
    const predictedSaving = predictedIncome - predictedExpense;
    const predictedNetWorth = netWorth + predictedSaving - saving;

    // Streak
    const uniqueDates = [...new Set(allTransactions.map(tx => tx.date))].sort().reverse();
    let streak = 0;
    let checkDate = new Date(now);
    for (let i = 0; i < uniqueDates.length && i < 365; i++) {
      const dateStr = checkDate.toISOString().slice(0, 10);
      if (uniqueDates.includes(dateStr)) {
        streak++;
        checkDate.setDate(checkDate.getDate() - 1);
      } else {
        break;
      }
    }

    // Net Worth History and Record Highest NW
    let runningBalances = {};
    accounts.forEach(acc => { runningBalances[acc.name] = acc.initialBalance; });
    const sortedTxs = allTransactions.slice().reverse();
    const monthlyNW = {};
    sortedTxs.forEach(tx => {
      if (tx.type === 'Income') runningBalances[tx.account] = (runningBalances[tx.account] || 0) + tx.amount;
      else if (tx.type === 'Expense') runningBalances[tx.account] = (runningBalances[tx.account] || 0) - tx.amount;
      else if (tx.type === 'Transfer') {
        runningBalances[tx.account] = (runningBalances[tx.account] || 0) - tx.amount;
        runningBalances[tx.accountTo] = (runningBalances[tx.accountTo] || 0) + tx.amount;
      }
      const mKey = tx.date ? tx.date.substring(0, 7) : '';
      if (mKey) {
        let nw = 0;
        accounts.forEach(acc => { if (acc.showOnDashboard) nw += runningBalances[acc.name] || 0; });
        monthlyNW[mKey] = nw;
      }
    });
    const nwValues = Object.values(monthlyNW);
    const isNetWorthHighest = nwValues.length > 0 && netWorth >= Math.max(...nwValues);

    let budgetMetMonths = 0;
    for (let i = 1; i <= 6; i++) {
      const m = new Date(currentYear, currentMonth - 1 - i, 1);
      const h = monthlyHistory.find(mh => mh.month === `${m.getFullYear()}-${String(m.getMonth() + 1).padStart(2, '0')}`);
      if (h && h.saving >= 0) budgetMetMonths++;
    }

    return {
      currentMonth, currentYear, dayOfMonth, daysInMonth, netWorth, totalIncome, totalExpense, saving, savingRate,
      prevIncome, prevExpense, prevSaving, prevSavingRate, budgetAnalysis, spendingByCategory, monthlyHistory, investmentData,
      prediction: { income: predictedIncome, expense: predictedExpense, saving: predictedSaving, netWorth: predictedNetWorth },
      streak, isNetWorthHighest, budgetMetMonths
    };
  },

  // EXPORT / IMPORT / DELETE
  async investExportAllData(target) {
    const data = { target };
    if (target === 'transactions' || target === 'all') {
      const rows = await getRows_('transactions');
      data.transactions = rows.map(r => ({

        amountIDR: toNumber_(r.AmountIDR),
        notes: normalize_(r.Notes),
        status: normalize_(r.Status) || 'Active'
      }));
    }
    if (target === 'portfolio' || target === 'all') {
      const rows = await getRows_('portfolio');
      data.portfolio = rows.map(r => ({
        platform: normalize_(r.Platform),
        sector: normalize_(r.Sector),
        asset: normalize_(r.Asset),
        currentValueIDR: toNumber_(r.CurrentValueIDR)
      }));
    }
    if (target === 'all') {
      const settings = await getRows_('settings');
      data.settings = settings.map(r => ({ key: normalize_(r.Key), value: normalize_(r.Value) }));
      const allocTargets = await getRows_('allocation_targets');
      data.allocationTargets = allocTargets.map(r => ({ sector: normalize_(r.Sector), targetPercent: toNumber_(r.TargetPercent) }));
    }
    return data;
  },

  async investImportData(payload) {
    const rows = payload.rows || [];
    if (!rows.length) return { success: false, message: 'File CSV kosong atau tidak valid.' };
    const inserts = rows.map(row => {
      const platform = normalize_(row.platform);
      const transactionType = normalize_(row.transactionType);
      return mapRowToDb({
        Date: row.date,
        Platform: platform,
        Sector: (transactionType === 'Deposit' || transactionType === 'Withdraw') ? 'Cash' : normalize_(row.sector),
        Asset: (transactionType === 'Deposit' || transactionType === 'Withdraw') ? platform + ' Cash' : normalize_(row.asset),
        TransactionType: transactionType,
        AmountIDR: toNumber_(row.amountIDR),
        Notes: normalize_(row.notes) || '',
        Status: 'Active'
      });
    }).filter(r => r.platform && r.transactiontype && r.amountidr > 0);

    if (inserts.length > 0) {
      const { error } = await supabaseClient.from('transactions').insert(inserts);
      if (error) throw error;
    }
    return { success: true, message: `Import berhasil: ${inserts.length} transaksi investasi ditambahkan.`, imported: inserts.length };
  },

  async investDeleteData(target) {
    if (target === 'transactions') {
      await supabaseClient.from('transactions').delete().neq('id', 0);
    } else if (target === 'portfolio') {
      await supabaseClient.from('portfolio').delete().neq('platform', '');
    } else if (target === 'settings') {
      await supabaseClient.from('settings').delete().neq('id', 0);
      await supabaseClient.from('allocation_targets').delete().neq('sector', '');
    } else if (target === 'all') {
      await supabaseClient.from('transactions').delete().neq('id', 0);
      await supabaseClient.from('portfolio').delete().neq('platform', '');
      await supabaseClient.from('settings').delete().neq('id', 0);
      await supabaseClient.from('allocation_targets').delete().neq('sector', '');
      await supabaseClient.from('targets').delete().neq('targetid', '');
    } else {
      return { success: false, message: 'Target tidak valid.' };
    }
    return { success: true, message: 'Data investasi berhasil direset.' };
  },

  async mmExportAllData(target) {
    const data = { target };
    if (target === 'transactions' || target === 'all') {
      const rows = await getRows_('mm_transactions');
      data.transactions = rows.map(r => ({
        date: formatDateForClient_(r.Date),
        type: normalize_(r.Type),
        account: normalize_(r.Account),
        accountTo: normalize_(r.AccountTo),
        category: normalize_(r.Category),
        subcategory: normalize_(r.Subcategory),
        amount: toNumber_(r.Amount),
        notes: normalize_(r.Notes),
        status: normalize_(r.Status) || 'Active'
      }));
    }
    if (target === 'accounts' || target === 'all') {
      const rows = await getRows_('mm_accounts');
      data.accounts = rows.map(r => ({
        name: normalize_(r.Name),
        icon: normalize_(r.Icon),
        initialBalance: toNumber_(r.InitialBalance),
        order: toNumber_(r.Order),
        showOnDashboard: normalize_(r.ShowOnDashboard) === 'true',
        status: normalize_(r.Status) || 'Active'
      }));
    }
    if (target === 'all') {
      const categories = await getRows_('mm_categories');
      data.categories = categories.map(r => ({
        type: normalize_(r.Type), category: normalize_(r.Category), subcategory: normalize_(r.Subcategory), status: normalize_(r.Status) || 'Active'
      }));
      const allocation = await getRows_('mm_allocation');
      data.allocation = allocation.map(r => ({
        category: normalize_(r.Category), percent: toNumber_(r.Percent), icon: normalize_(r.Icon), color: normalize_(r.Color)
      }));
    }
    return data;
  },

  async mmImportData(payload) {
    const rows = payload.rows || [];
    if (!rows.length) return { success: false, message: 'File CSV kosong atau tidak valid.' };
    const inserts = rows.map(row => mapRowToDb({
      Date: row.date,
      Type: normalize_(row.type),
      Account: normalize_(row.account) || '',
      AccountTo: normalize_(row.accountTo) || '',
      Category: normalize_(row.category) || '',
      Subcategory: normalize_(row.subcategory) || '',
      Amount: toNumber_(row.amount),
      Notes: normalize_(row.notes) || '',
      Status: 'Active'
    })).filter(r => r.type && r.amount > 0);

    if (inserts.length > 0) {
      const { error } = await supabaseClient.from('mm_transactions').insert(inserts);
      if (error) throw error;
    }
    return { success: true, message: `Import berhasil: ${inserts.length} transaksi ditambahkan.`, imported: inserts.length };
  },

  async mmDeleteData(target) {
    if (target === 'transactions') {
      await supabaseClient.from('mm_transactions').delete().neq('id', 0);
    } else if (target === 'accounts') {
      await supabaseClient.from('mm_accounts').delete().neq('accountid', '');
    } else if (target === 'categories') {
      await supabaseClient.from('mm_categories').delete().neq('id', 0);
    } else if (target === 'all') {
      await supabaseClient.from('mm_transactions').delete().neq('id', 0);
      await supabaseClient.from('mm_accounts').delete().neq('accountid', '');
      await supabaseClient.from('mm_categories').delete().neq('id', 0);
      await supabaseClient.from('mm_allocation').delete().neq('category', '');
    } else {
      return { success: false, message: 'Target tidak valid.' };
    }
    return { success: true, message: 'Data keuangan berhasil direset.' };
  },

  async testConnection() {
    try {
      const { data, error } = await supabaseClient.from('targets').select('*').limit(1);
      if (error) throw error;
      return { success: true, message: 'Koneksi database supabaseClient berhasil!' };
    } catch (e) {
      return { success: false, message: 'Koneksi gagal: ' + e.message };
    }
  }
};

// 2. Apps Script Runner Mock Builder (Intercepting google.script.run)
class AppsScriptMockRunner {
  constructor(successCb, failureCb) {
    this.successCb = successCb;
    this.failureCb = failureCb;
  }
  withSuccessHandler(cb) {
    this.successCb = cb;
    return this;
  }
  withFailureHandler(cb) {
    this.failureCb = cb;
    return this;
  }
}

// Proxy handlers for dynamic method calling
const runnerProxyHandler = {
  get(runner, methodName) {
    if (methodName in runner) {
      return runner[methodName];
    }
    // Intercept any undefined method call and map it to DB_API
    return async (...args) => {
      try {
        if (!DB_API[methodName]) {
          throw new Error(`Google Apps Script function "${methodName}" is not implemented in the supabaseClient adapter.`);
        }
        const result = await DB_API[methodName](...args);
        if (runner.successCb) runner.successCb(result);
      } catch (err) {
        console.error(`Error executing ${methodName}:`, err);
        if (runner.failureCb) runner.failureCb(err);
        else showToast(`Error: ${err.message || err}`, 'error');
      }
    };
  }
};

function createRunner(successCb, failureCb) {
  const runner = new AppsScriptMockRunner(successCb, failureCb);
  return new Proxy(runner, runnerProxyHandler);
}

// Create global window.google object
window.google = {
  script: {
    run: new Proxy({}, {
      get(target, prop) {
        if (prop === 'withSuccessHandler') {
          return (cb) => createRunner(cb, null);
        }
        if (prop === 'withFailureHandler') {
          return (cb) => createRunner(null, cb);
        }
        // Direct call
        return async (...args) => {
          try {
            if (!DB_API[prop]) throw new Error(`Function "${prop}" is not implemented.`);
            await DB_API[prop](...args);
          } catch(err) {
            console.error(err);
            showToast(`Error: ${err.message || err}`, 'error');
          }
        };
      }
    })
  }
};

// 3. supabaseClient Credentials Manager
function initSupabaseClient(isFirstTime) {
  const creds = getSupabaseCredentials();
  const url = creds.url;
  const key = creds.key;
  
  if (url && key) {
    supabaseClient = window.supabase.createClient(url, key);
    document.getElementById('supabaseSetupOverlay').classList.add('hidden');
    
    // Automatically trigger app load if it's the first setup, or if hardcoded variables exist and app is not yet initialized
    const hasLocalStorage = localStorage.getItem('supabase_url') && localStorage.getItem('supabase_key');
    if (isFirstTime || (!hasLocalStorage && HARDCODED_SUPABASE_URL && HARDCODED_SUPABASE_KEY)) {
      setTimeout(() => {
        if (typeof initApp === 'function') initApp();
      }, 100);
    }
  } else {
    document.getElementById('supabaseSetupOverlay').classList.remove('hidden');
  }
}

// Wizard connection saver
async function saveSupabaseWizard(event) {
  event.preventDefault();
  const url = document.getElementById('wizardSupabaseUrl').value.trim();
  const key = document.getElementById('wizardSupabaseKey').value.trim();
  const statusEl = document.getElementById('wizardStatus');
  
  statusEl.textContent = 'Menghubungkan ke database...';
  statusEl.className = 'setup-status';
  
  try {
    const tempSupabase = window.supabase.createClient(url, key);
    const { error } = await tempSupabase.from('targets').select('*').limit(1);
    
    if (error) throw error;
    
    // Save to localStorage
    localStorage.setItem('supabase_url', url);
    localStorage.setItem('supabase_key', key);
    
    statusEl.textContent = 'Koneksi sukses! Memuat data...';
    statusEl.className = 'setup-status success';
    
    // Trigger launch
    setTimeout(() => {
      initSupabaseClient(true);
    }, 1000);
  } catch (err) {
    statusEl.textContent = 'Gagal terhubung: ' + (err.message || 'Periksa URL / Anon Key.');
    statusEl.className = 'setup-status error';
  }
}

// 4. supabaseClient UI Settings Page injection
function saveSupabaseSettingsForm(event) {
  event.preventDefault();
  const url = document.getElementById('supabaseSettingsUrl').value.trim();
  const key = document.getElementById('supabaseSettingsKey').value.trim();
  
  localStorage.setItem('supabase_url', url);
  localStorage.setItem('supabase_key', key);
  showToast('supabaseClient settings saved! Reloading...', 'success');
  setTimeout(() => {
    window.location.reload();
  }, 1000);
}

function resetSupabaseSettings() {
  if (confirm('Apakah Anda yakin ingin memutuskan koneksi database? Data tidak akan hilang di supabaseClient, tapi Anda harus memasukkan URL & Anon Key lagi.')) {
    localStorage.removeItem('supabase_url');
    localStorage.removeItem('supabase_key');
    window.location.reload();
  }
}

  if (!settingsPage) return;
  
  const currentUrl = localStorage.getItem('supabase_url') || '';
  const currentKey = localStorage.getItem('supabase_key') || '';
  
  const cardHtml = `
    <!-- supabaseClient Connection Config Card -->
    <section class="panel-card">
      <button class="panel-toggle" onclick="togglePanel('supabaseSettingsPanel')">
        <div>
          <p class="panel-eyebrow">Database</p>
          <h3 class="panel-title">supabaseClient connection</h3>
        </div>
        <strong class="panel-chevron" id="supabaseSettingsChevron">↓</strong>
      </button>
      <div id="supabaseSettingsPanel" class="panel-body hidden">
        <form class="stack-form" onsubmit="saveSupabaseSettingsForm(event)" style="display:flex;flex-direction:column;gap:12px;">
          <label class="form-label" style="display:flex;flex-direction:column;gap:4px;font-size:12px;font-weight:600;">
            supabaseClient URL
            <input type="url" id="supabaseSettingsUrl" class="form-input" value="${currentUrl}" required placeholder="https://yourproject.supabaseClient.co" style="width:100%;padding:8px;border-radius:4px;border:1px solid var(--border);background:rgba(255,255,255,0.02);color:#fff;">
          </label>
          <label class="form-label" style="display:flex;flex-direction:column;gap:4px;font-size:12px;font-weight:600;">
            supabaseClient Anon Key
            <input type="password" id="supabaseSettingsKey" class="form-input" value="${currentKey}" required placeholder="Anon Key" style="width:100%;padding:8px;border-radius:4px;border:1px solid var(--border);background:rgba(255,255,255,0.02);color:#fff;">
          </label>
          <div style="display:flex;gap:8px;margin-top:8px;">
            <button class="btn-primary" type="submit" style="flex:1;">Update Connection</button>
            <button class="btn-ghost" type="button" onclick="resetSupabaseSettings()" style="color:var(--error);border-color:var(--error);">Disconnect</button>
          </div>
        </form>
      </div>
    </section>
  `;
  
  // Insert at the top of settings page (after header card)
  const headerCard = settingsPage.querySelector('.page-header-card');
  if (headerCard) {
    headerCard.insertAdjacentHTML('afterend', cardHtml);
  }
}

// Initial bootstrapper
function bootstrapDb() {
  initSupabaseClient(false);
  setTimeout(injectSupabaseSettingsCard, 300);
}
if (document.readyState === 'loading') {
  window.addEventListener('DOMContentLoaded', bootstrapDb);
} else {
  bootstrapDb();
}
