<script>
/* ============================================================
   MONEY MANAGEMENT — Frontend JavaScript
   ============================================================ */

let MM_DASHBOARD = null;
let MM_ACCOUNTS = [];
let MM_CATEGORIES = [];
let MM_ALLOCATION = [];
let MM_CAL_YEAR = new Date().getFullYear();
let MM_CAL_MONTH = new Date().getMonth() + 1;
let MM_HIST_YEAR = new Date().getFullYear();
let MM_HIST_MONTH = new Date().getMonth() + 1;
let mmHistoryChart = null;

/* === PAGE NAVIGATION === */
function mmShowPage(pageId) {
  document.querySelectorAll('#moneyWorkspace .page').forEach(p => p.classList.remove('active-page'));
  const page = document.getElementById(pageId);
  if (page) page.classList.add('active-page');
  document.querySelectorAll('#mmBottomTabs .tab-item').forEach(b => b.classList.remove('active'));
  const active = document.querySelector(`#mmBottomTabs .tab-item[data-page="${pageId}"]`);
  if (active) active.classList.add('active');

  // Only load data if not cached
  if (pageId === 'mmDashboardPage') mmLoadDashboard(true);
  if (pageId === 'mmHistoryPage' && !document.getElementById('mmHistoryAllTime').innerHTML.trim()) mmLoadHistory();
  if (pageId === 'mmCalendarPage' && !document.getElementById('mmCalendarGrid').children.length) mmLoadCalendar(MM_CAL_YEAR, MM_CAL_MONTH);
  if (pageId === 'mmSettingsPage' && !document.getElementById('mmSettingsAccountsList').innerHTML.includes('mm-settings-acc-row')) mmLoadSettings();
  if (pageId === 'mmInsightPage') loadFinancialInsight();
}

/* === FAB === */
function mmToggleFab() {
  const btn = document.getElementById('mmFabBtn');
  const menu = document.getElementById('mmFabMenu');
  const overlay = document.getElementById('mmFabOverlay');
  const isOpen = btn.classList.contains('open');
  btn.classList.toggle('open');
  menu.classList.toggle('open');
  overlay.classList.toggle('hidden', isOpen);
}

/* Old mmShowActionSheet, mmCloseActionSheet, mmCloseActionSheetBackdrop
   are now in Script_TxInput.html */

/* === DROPDOWNS === */
function mmPopulateDropdowns() {
  const accountOpts = MM_ACCOUNTS.map(a => `<option value="${escapeHtml(a.name)}">${a.icon} ${escapeHtml(a.name)}</option>`).join('');
  const selectHtml = '<option value="">Select...</option>' + accountOpts;

  ['mmIncomeAccount', 'mmExpenseAccount', 'mmTransferFrom', 'mmTransferTo'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = selectHtml;
  });

  // Income categories — de-duplicate by category name
  const incomeCats = [...new Set(
    MM_CATEGORIES.filter(c => c.type === 'Income').map(c => c.category)
  )];
  const incomeEl = document.getElementById('mmIncomeCategory');
  if (incomeEl) {
    incomeEl.innerHTML = '<option value="">None</option>' +
      incomeCats.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
  }

  // Expense main categories (allocation categories)
  const expEl = document.getElementById('mmExpenseCategory');
  if (expEl) {
    const allocCats = MM_ALLOCATION.map(a => a.category);
    expEl.innerHTML = '<option value="">Select...</option>' +
      allocCats.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
  }
}

function mmUpdateSubcategories(category) {
  const subEl = document.getElementById('mmExpenseSubcategory');
  if (!subEl) return;
  const subs = MM_CATEGORIES
    .filter(c => c.type === 'Expense' && c.category === category && c.subcategory)
    .map(c => c.subcategory);
  subEl.innerHTML = '<option value="">None</option>' +
    subs.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');
}

function mmUpdateIncomeSubcategories(category) {
  const subEl = document.getElementById('mmIncomeSubcategory');
  if (!subEl) return;
  const subs = MM_CATEGORIES
    .filter(c => c.type === 'Income' && c.category === category && c.subcategory)
    .map(c => c.subcategory);
  subEl.innerHTML = '<option value="">None</option>' +
    subs.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');
}

/* === DASHBOARD === */
function mmLoadDashboard(skipIfCached) {
  if (!window.supabaseConnected) {
    const container = document.getElementById('mmAccountsScroll');
    if (container) container.innerHTML = '<div class="empty-state">Database is not connected. Configure connection in Settings.</div>';
    return;
  }
  // If skipIfCached is true and we have data, just re-render from cache
  if (skipIfCached && MM_DASHBOARD) {
    mmRenderDashboard(MM_DASHBOARD);
    return;
  }

  // Mark insight and history as stale since data is being refreshed
  if (typeof INSIGHT_LOADED !== 'undefined') INSIGHT_LOADED = false;
  MM_ALLTIME_CACHE = null;
  MM_MONTH_CACHE = {};

  const container = document.getElementById('mmAccountsScroll');
  if (container) container.innerHTML = '<div class="mm-loading"><div class="mm-spinner"></div>Loading...</div>';

  google.script.run
    .withSuccessHandler(data => {
      MM_DASHBOARD = data;
      MM_ACCOUNTS = data.accounts || [];
      MM_ALLOCATION = data.allocation || [];
      mmRenderDashboard(data);
    })
    .withFailureHandler(err => showToast(err.message || 'Failed to load dashboard.', 'error'))
    .mmGetDashboard();

  // Load categories (lightweight, needed for dropdowns)
  if (!MM_CATEGORIES.length) {
    google.script.run
      .withSuccessHandler(cats => { MM_CATEGORIES = cats || []; })
      .withFailureHandler(() => {})
      .mmGetCategories();
  }
}

function mmRenderDashboard(data) {
  // Greeting
  const hour = new Date().getHours();
  let greeting = 'Good evening,';
  if (hour < 12) greeting = 'Good morning,';
  else if (hour < 17) greeting = 'Good afternoon,';
  setText('mmGreeting', greeting);

  // User name
  const savedName = localStorage.getItem('mm_user_name') || 'User 🌿';
  setText('mmUserName', savedName);

  // Date display
  const now = new Date();
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  setText('mmDateText', now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear());

  // Net worth
  setText('mmNetWorthValue', mmFormatIDR(data.netWorth));

  // Change badge
  const badge = document.getElementById('mmChangeBadge');
  if (badge) {
    if (data.prevNetWorth && data.prevNetWorth > 0) {
      const changePct = ((data.netWorth - data.prevNetWorth) / data.prevNetWorth * 100).toFixed(1);
      const isUp = data.netWorth >= data.prevNetWorth;
      badge.textContent = (isUp ? '↑ ' : '↓ ') + Math.abs(changePct) + '%';
      badge.className = 'mm-change-badge ' + (isUp ? 'up' : 'down');
    } else {
      badge.textContent = '↑ 0%';
      badge.className = 'mm-change-badge up';
    }
  }

  // Sparkline
  mmRenderSparkline(data);

  // Summary values
  setText('mmTotalIncome', mmFormatIDR(data.totalIncome));
  setText('mmTotalExpense', mmFormatIDR(data.totalExpense));
  setText('mmTotalSaving', mmFormatIDR(data.saving));

  // Color saving
  const savingEl = document.getElementById('mmTotalSaving');
  if (savingEl) {
    savingEl.style.color = data.saving >= 0 ? 'var(--success)' : 'var(--error)';
  }

  // Net saving rate
  const rate = data.totalIncome > 0 ? Math.round((data.saving / data.totalIncome) * 100) : 0;
  setText('mmNetSavingRate', rate + '%');

  // Render accounts
  mmRenderAccountCards(data.accounts || []);

  // Render budget
  mmRenderBudgetCard(data.allocationCards || [], data.totalIncome || 0);

  // Render chart and transactions
  mmRenderChart('expense');
  mmRenderDashboardTransactions();
}

/* === SPARKLINE === */
function mmRenderSparkline(data) {
  const canvas = document.getElementById('mmNetworthSparkline');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width = canvas.offsetWidth * 2;
  const h = canvas.height = canvas.offsetHeight * 2;
  ctx.clearRect(0, 0, w, h);

  // Generate sparkline data from daily transaction sums
  const txs = (data && data.monthTransactions) || [];
  const dayMap = {};
  txs.forEach(tx => {
    if (!tx.date) return;
    const d = new Date(tx.date).getDate();
    if (!dayMap[d]) dayMap[d] = 0;
    if (tx.type === 'Income') dayMap[d] += tx.amount;
    if (tx.type === 'Expense') dayMap[d] -= tx.amount;
  });

  const today = new Date().getDate();
  let cumulative = data.netWorth - Object.values(dayMap).reduce((s, v) => s + v, 0);
  const points = [];
  for (let d = 1; d <= today; d++) {
    cumulative += (dayMap[d] || 0);
    points.push(cumulative);
  }

  if (points.length < 2) {
    // Draw a simple upward line
    points.length = 0;
    for (let i = 0; i < 10; i++) points.push(data.netWorth * (0.85 + 0.15 * (i / 9)));
  }

  const min = Math.min(...points);
  const max = Math.max(...points);
  const range = max - min || 1;
  const padTop = h * 0.15;
  const padBot = h * 0.05;
  const usableH = h - padTop - padBot;

  ctx.beginPath();
  points.forEach((val, i) => {
    const x = (i / (points.length - 1)) * w;
    const y = padTop + usableH - ((val - min) / range) * usableH;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });

  ctx.strokeStyle = '#10b981';
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.stroke();

  // Fill gradient under the line
  const lastX = w;
  const lastY = padTop + usableH - ((points[points.length - 1] - min) / range) * usableH;
  ctx.lineTo(lastX, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, 'rgba(16,185,129,0.25)');
  grad.addColorStop(1, 'rgba(16,185,129,0)');
  ctx.fillStyle = grad;
  ctx.fill();
}

/* === ACCOUNT CARDS === */
function mmRenderAccountCards(accounts) {
  const container = document.getElementById('mmAccountsScroll');
  if (!container) return;

  const visible = accounts.filter(a => a.showOnDashboard);
  if (!visible.length) {
    container.innerHTML = '<div class="empty-state">No accounts yet. Add one in Settings.</div>';
    return;
  }

  const typeColors = {
    'Bank': '#3b82f6', 'E-Wallet': '#10b981', 'Cash': '#f59e0b',
    'Credit Card': '#ef4444', 'Investment': '#8b5cf6', 'Other': '#6b7280'
  };

  container.innerHTML = visible.map(a => {
    const color = typeColors[a.type] || typeColors['Other'];
    const initials = (a.name || '').substring(0, 2).toUpperCase();
    return `
      <div class="mm-account-card" onclick="mmShowAccountTransactions('${escapeHtml(a.name)}')">
        <div class="mm-account-top">
          <div class="mm-account-logo" style="background:${color}22;color:${color}">
            ${a.icon ? escapeHtml(a.icon) : initials}
          </div>
          <div class="mm-account-info-col">
            <span class="mm-account-name">${escapeHtml(a.name)}</span>
            <span class="mm-account-type">${escapeHtml(a.type || 'Account')}</span>
          </div>
        </div>
        <div class="mm-account-balance">${mmFormatIDR(a.balance)}</div>
      </div>`;
  }).join('');
}

/* === BUDGET CARD === */
function mmRenderBudgetCard(allocationCards, totalIncome) {
  const totalBudget = allocationCards.reduce((s, c) => s + (c.target || 0), 0);
  const totalSpent = allocationCards.reduce((s, c) => s + (c.spent || 0), 0);
  const remaining = totalBudget - totalSpent;
  const pct = totalBudget > 0 ? Math.round((totalSpent / totalBudget) * 100) : 0;

  setText('mmBudgetSubtitle', mmFormatIDR(totalBudget) + ' Budget');
  setText('mmBudgetUsed', mmFormatIDR(totalSpent) + ' used');
  setText('mmBudgetPercent', pct + '%');
  setText('mmBudgetRemaining', mmFormatIDR(Math.abs(remaining)) + (remaining >= 0 ? ' left' : ' over'));

  const fill = document.getElementById('mmBudgetBarFill');
  if (fill) {
    fill.style.width = Math.min(pct, 100) + '%';
    if (pct > 100) fill.style.background = 'linear-gradient(90deg, #ef4444, #f59e0b)';
    else fill.style.background = '';
  }

  const remaining_el = document.getElementById('mmBudgetRemaining');
  if (remaining_el) remaining_el.style.color = remaining >= 0 ? 'var(--accent)' : 'var(--error)';
}

/* === CHART === */
let mmApexChart = null;
let mmChartActiveIndex = -1;
let mmCurrentChartType = 'expense';

function mmSwitchChartTab(btn, type) {
  document.querySelectorAll('.mm-expense-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  mmRenderChart(type);
}

function mmRenderChart(type) {
  mmCurrentChartType = type;
  mmChartActiveIndex = -1;

  const donutEl = document.getElementById('mmChartDonut');
  const listEl = document.getElementById('mmChartCategoryList');
  if (!donutEl || !listEl) return;

  if (!MM_DASHBOARD) {
    donutEl.innerHTML = '<div class="empty-state">No data yet.</div>';
    listEl.innerHTML = '';
    return;
  }

  const colors = ['#10b981', '#f59e0b', '#ec4899', '#3b82f6', '#f97316', '#8b5cf6', '#ef4444', '#14b8a6', '#a855f7', '#06b6d4'];
  let entries = [];
  let total = 0;

  if (type === 'expense') {
    const cards = (MM_DASHBOARD.allocationCards || []).filter(c => c.spent > 0).sort((a, b) => b.spent - a.spent);
    total = cards.reduce((s, c) => s + c.spent, 0);
    entries = cards.map((c, i) => ({ name: c.category, amount: c.spent, color: mmCategoryColor(c.category) || colors[i % colors.length] }));
  } else {
    const txs = (MM_DASHBOARD && MM_DASHBOARD.monthTransactions) || [];
    const catMap = {};
    txs.forEach(tx => {
      if (tx.type === 'Income') {
        const cat = tx.category || 'Other';
        catMap[cat] = (catMap[cat] || 0) + tx.amount;
      }
    });
    const sorted = Object.entries(catMap).sort((a, b) => b[1] - a[1]);
    total = sorted.reduce((s, e) => s + e[1], 0);
    entries = sorted.map(([name, amount], i) => ({ name, amount, color: colors[i % colors.length] }));
  }

  if (total <= 0) {
    donutEl.innerHTML = '<div class="empty-state">No data this month.</div>';
    listEl.innerHTML = '';
    return;
  }

  mmRenderDonut(entries, total, type);
  mmRenderCategoryList(entries, total);
}

function mmRenderDonut(entries, total, type) {
  const donutEl = document.getElementById('mmChartDonut');

  if (mmApexChart) {
    mmApexChart.destroy();
    mmApexChart = null;
  }

  donutEl.innerHTML = '';

  const series = entries.map(e => e.amount);
  const labels = entries.map(e => e.name);
  const chartColors = entries.map(e => e.color);

  const options = {
    series: series,
    chart: {
      type: 'donut',
      height: 150,
      background: 'transparent',
      animations: {
        enabled: true,
        easing: 'easeinout',
        speed: 800,
        animateGradually: { enabled: true, delay: 100 }
      },
      events: {
        dataPointSelection: function(event, chartContext, config) {
          const idx = config.dataPointIndex;
          mmHighlightCategory(idx);
        }
      }
    },
    colors: chartColors,
    labels: labels,
    plotOptions: {
      pie: {
        donut: {
          size: '65%',
          labels: {
            show: true,
            name: {
              show: true,
              fontSize: '9px',
              fontFamily: 'Inter',
              fontWeight: 600,
              color: '#a1a1aa',
              offsetY: -6
            },
            value: {
              show: true,
              fontSize: '13px',
              fontFamily: 'Inter',
              fontWeight: 800,
              color: '#fafafa',
              offsetY: 2,
              formatter: function(val) {
                if (typeof AMOUNTS_HIDDEN !== 'undefined' && AMOUNTS_HIDDEN) return '••••••';
                return 'Rp' + Number(val).toLocaleString('id-ID');
              }
            },
            total: {
              show: true,
              showAlways: true,
              label: type === 'expense' ? 'Expense' : 'Income',
              fontSize: '9px',
              fontFamily: 'Inter',
              fontWeight: 600,
              color: '#a1a1aa',
              formatter: function(w) {
                const t = w.globals.seriesTotals.reduce((a, b) => a + b, 0);
                if (typeof AMOUNTS_HIDDEN !== 'undefined' && AMOUNTS_HIDDEN) return '••••••';
                return 'Rp' + t.toLocaleString('id-ID');
              }
            }
          }
        },
        expandOnClick: true
      }
    },
    stroke: {
      show: true,
      width: 2,
      colors: ['#09090b']
    },
    dataLabels: { enabled: false },
    legend: { show: false },
    tooltip: {
      enabled: true,
      theme: 'dark',
      style: { fontSize: '11px', fontFamily: 'Inter' },
      y: {
        formatter: function(val) {
          if (typeof AMOUNTS_HIDDEN !== 'undefined' && AMOUNTS_HIDDEN) return '••••••';
          return 'Rp' + Number(val).toLocaleString('id-ID');
        }
      }
    },
    states: {
      hover: { filter: { type: 'lighten', value: 0.05 } },
      active: { filter: { type: 'none' } }
    },
    responsive: [{
      breakpoint: 480,
      options: { chart: { height: 140 } }
    }]
  };

  mmApexChart = new ApexCharts(donutEl, options);
  mmApexChart.render();
}

function mmHighlightCategory(index) {
  mmChartActiveIndex = index;
  const items = document.querySelectorAll('.mm-category-item');
  items.forEach((item, i) => {
    item.classList.toggle('active', i === index);
  });
}

function mmSelectCategoryFromList(index) {
  mmChartActiveIndex = index;
  if (mmApexChart) {
    mmApexChart.toggleDataPointSelection(index);
  }
  const items = document.querySelectorAll('.mm-category-item');
  items.forEach((item, i) => {
    item.classList.toggle('active', i === index);
  });
}

function mmRenderCategoryList(entries, total) {
  const listEl = document.getElementById('mmChartCategoryList');
  if (!listEl) return;

  // Show max 4 categories in side-by-side view
  const display = entries.slice(0, 4);

  listEl.innerHTML = display.map((entry, i) => {
    const pct = ((entry.amount / total) * 100).toFixed(0);
    const icon = mmCategoryEmoji(entry.name);
    return `
      <div class="mm-category-item" onclick="mmSelectCategoryFromList(${i});mmShowCategoryDetail('${escapeHtml(entry.name)}')">
        <div class="mm-cat-icon" style="background:${entry.color}22;color:${entry.color}">${icon}</div>
        <span class="mm-cat-name">${escapeHtml(entry.name)}</span>
        <span class="mm-cat-amount">${mmFormatIDR(entry.amount)}</span>
        <span class="mm-cat-percent">${pct}%</span>
      </div>`;
  }).join('');
}

/* === DASHBOARD TRANSACTIONS === */
function mmRenderDashboardTransactions() {
  const container = document.getElementById('mmDashboardTransactions');
  if (!container) return;

  const txs = (MM_DASHBOARD && MM_DASHBOARD.monthTransactions) || [];
  if (!txs.length) {
    container.innerHTML = '<div class="empty-state">No transactions this month.</div>';
    return;
  }

  // Sort by date desc, show latest 4
  const sorted = [...txs].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  const display = sorted.slice(0, 4);

  container.innerHTML = display.map(tx => {
    const prefix = tx.type === 'Income' ? '+' : tx.type === 'Expense' ? '-' : '';
    const colorClass = tx.type === 'Income' ? 'income-color' : tx.type === 'Expense' ? 'expense-color' : 'transfer-color';
    const catColor = mmCategoryColor(tx.category, tx.type);
    const catIcon = mmCategoryEmoji(tx.category, tx.type);
    const label = tx.notes || tx.subcategory || tx.category || tx.type;
    const category = tx.subcategory || tx.category || tx.type;
    const dateStr = mmFormatDate(tx.date);

    return `
      <div class="mm-transaction-item" onclick="mmShowTxDetail(${tx.rowNumber}, '${escapeHtml(tx.type)}', '${escapeHtml(tx.account)}', '${escapeHtml(tx.accountTo || '')}', '${escapeHtml(tx.category || '')}', '${escapeHtml(tx.subcategory || '')}', ${tx.amount}, '${escapeHtml(tx.notes || '')}', '${escapeHtml(tx.date || '')}')">
        <div class="mm-tx-icon-dash" style="background:${catColor}18;color:${catColor}">${catIcon}</div>
        <div class="mm-tx-info-dash">
          <div class="mm-tx-name-dash">${escapeHtml(label)}</div>
          <div class="mm-tx-category-dash">${escapeHtml(category)}</div>
        </div>
        <div class="mm-tx-right-dash">
          <div class="mm-tx-date-dash">${dateStr}</div>
          <div class="mm-tx-amount-dash ${colorClass}">${prefix}${mmFormatIDR(tx.amount)}</div>
        </div>
      </div>`;
  }).join('');
}

/* === TRANSACTION DETAIL BOTTOM SHEET === */
function mmShowTxDetail(rowNumber, type, account, accountTo, category, subcategory, amount, notes, date) {
  const sheet = document.getElementById('mmTxDetailSheet');
  const content = document.getElementById('mmTxDetailContent');
  
  const prefix = type === 'Income' ? '+' : type === 'Expense' ? '-' : '';
  const color = type === 'Income' ? 'var(--success)' : type === 'Expense' ? 'var(--error)' : '#60a5fa';
  
  let details = `<p style="font-size:12px;color:var(--text-muted);margin:4px 0;">${mmFormatDate(date)} · ${account}`;
  if (type === 'Transfer' && accountTo) details += ` → ${accountTo}`;
  if (category) details += ` · ${category}`;
  if (subcategory) details += ` / ${subcategory}`;
  details += `</p>`;
  
  content.innerHTML = `
    <h3 class="sheet-title">${type}</h3>
    <p style="font-size:22px;font-weight:800;color:${color};margin:8px 0;font-variant-numeric:tabular-nums;">${prefix}${mmFormatIDR(amount)}</p>
    ${details}
    ${notes ? `<p style="font-size:13px;color:var(--text);margin:8px 0;">${escapeHtml(notes)}</p>` : ''}
    <button class="btn-primary btn-full" style="margin-top:16px;" onclick="mmShowEditTx(${rowNumber}, '${escapeHtml(type)}', '${escapeHtml(account)}', '${escapeHtml(accountTo || '')}', '${escapeHtml(category || '')}', '${escapeHtml(subcategory || '')}', ${amount}, '${escapeHtml(notes || '')}', '${escapeHtml(date || '')}')">Edit Transaction</button>
    <button class="btn-primary btn-full" style="background:var(--error);box-shadow:0 4px 16px rgba(239,68,68,0.25);margin-top:8px;" onclick="mmDeleteTxFromDetail(${rowNumber})">Delete Transaction</button>
    <button class="btn-ghost btn-full" style="margin-top:8px;" onclick="mmCloseTxDetailDirect()">Cancel</button>
  `;
  
  sheet.classList.remove('hidden');
}

function mmShowEditTx(rowNumber, type, account, accountTo, category, subcategory, amount, notes, date) {
  const content = document.getElementById('mmTxDetailContent');
  
  const accountOpts = MM_ACCOUNTS.map(a => {
    const sel = a.name === account ? 'selected' : '';
    return `<option value="${escapeHtml(a.name)}" ${sel}>${a.icon} ${escapeHtml(a.name)}</option>`;
  }).join('');

  const accountToOpts = MM_ACCOUNTS.map(a => {
    const sel = a.name === accountTo ? 'selected' : '';
    return `<option value="${escapeHtml(a.name)}" ${sel}>${a.icon} ${escapeHtml(a.name)}</option>`;
  }).join('');

  let extraFields = '';
  if (type === 'Transfer') {
    extraFields = `
      <label class="form-label">To Account <select name="accountTo" class="form-input"><option value="">Select...</option>${accountToOpts}</select></label>`;
  } else {
    const allocCats = MM_ALLOCATION.map(a => a.category);
    const catOpts = allocCats.map(c => {
      const sel = c === category ? 'selected' : '';
      return `<option value="${escapeHtml(c)}" ${sel}>${escapeHtml(c)}</option>`;
    }).join('');
    extraFields = `
      <label class="form-label">Category <select name="category" class="form-input"><option value="">None</option>${catOpts}</select></label>
      <label class="form-label">Subcategory <input type="text" name="subcategory" class="form-input" value="${escapeHtml(subcategory)}" placeholder="Optional"></label>`;
  }

  content.innerHTML = `
    <h3 class="sheet-title">Edit ${type}</h3>
    <form id="mmEditTxForm" class="form-stack" style="margin-top:12px;" onsubmit="mmSubmitEditTx(event, ${rowNumber}, '${escapeHtml(type)}')">

      <label class="form-label">Notes <textarea name="notes" class="form-input" rows="2">${escapeHtml(notes)}</textarea></label>
      <button type="submit" class="btn-primary btn-full">Save Changes</button>
      <button type="button" class="btn-ghost btn-full" onclick="mmCloseTxDetailDirect()">Cancel</button>
    </form>`;
  
  setupMoneyInputs();
}

function mmSubmitEditTx(event, rowNumber, type) {
  event.preventDefault();
  const form = event.target;
  const payload = {
    rowNumber: rowNumber,
    date: form.date.value,
    type: type,
    account: form.account.value,
    accountTo: form.accountTo ? form.accountTo.value : '',
    category: form.category ? form.category.value : '',
    subcategory: form.subcategory ? form.subcategory.value : '',
    amount: parseMoneyInput(form.amount.value),
    notes: form.notes.value
  };

  const btn = form.querySelector('button[type="submit"]');
  setButtonLoading(btn, true, 'Saving...');

  google.script.run
    .withSuccessHandler(result => {
      setButtonLoading(btn, false, 'Save Changes');
      if (result && result.success) {
        showToast('Transaction updated.', 'success');
        mmCloseTxDetailDirect();
        MM_DASHBOARD = null;
        mmLoadDashboard();
      } else { showToast('Failed.', 'error'); }
    })
    .withFailureHandler(err => {
      setButtonLoading(btn, false, 'Save Changes');
      showToast(err.message || 'Failed.', 'error');
    })
    .mmUpdateTransaction(payload);
}

function mmCloseTxDetail(event) {
  if (event.target === event.currentTarget) {
    document.getElementById('mmTxDetailSheet').classList.add('hidden');
  }
}

function mmCloseTxDetailDirect() {
  document.getElementById('mmTxDetailSheet').classList.add('hidden');
}

function mmDeleteTxFromDetail(rowNumber) {
  if (!confirm('Delete this transaction?')) return;
  google.script.run
    .withSuccessHandler(result => {
      if (result && result.success) {
        showToast('Transaction deleted.', 'success');
        document.getElementById('mmTxDetailSheet').classList.add('hidden');
        MM_DASHBOARD = null;
        mmLoadDashboard();
      } else {
        showToast('Failed to delete.', 'error');
      }
    })

    .mmDeleteTransaction(rowNumber);
}

function mmSubmitExpense(event) {
  event.preventDefault();

    type: 'Expense',

function mmSubmitTransfer(event) {
  event.preventDefault();
  const form = event.target;
  const direction = document.getElementById('mmTransferDirection').value;
  const amount = parseMoneyInput(form.amount.value);
  
  let payload = {
    date: form.date.value,
    type: 'Transfer',
    account: '',
    accountTo: '',
    category: '',
    subcategory: '',
    amount: amount,
    notes: form.notes.value
  };

  if (direction === 'mm-to-mm') {
    payload.account = form.accountId.value;
    payload.accountTo = form.accountToId.value;
    if (payload.account === payload.accountTo) {
      showToast('From and To must be different.', 'error');
      return;
    }
  } else if (direction === 'mm-to-invest') {
    payload.account = form.accountId.value;
    payload.accountTo = 'Invest:' + form.accountToId.value;
  } else if (direction === 'invest-to-mm') {
    payload.account = 'Invest:' + form.accountId.value;
    payload.accountTo = form.accountToId.value;
  }

  if (!payload.account || !payload.accountTo) {
    showToast('Please fill all fields.', 'error');
    return;
  }

  mmSaveTransaction(form, payload, 'Save Transfer');
}

/* === HISTORY === */
let MM_ALLTIME_CACHE = null;
let MM_MONTH_CACHE = {};

function mmLoadHistory() {
  mmSwitchHistoryTab('alltime');
}

function mmSwitchHistoryTab(tab) {
  const tabs = document.querySelectorAll('.mm-history-tabs .tab-btn');
  tabs.forEach(t => t.classList.remove('active'));

  document.querySelectorAll('.mm-history-content').forEach(c => c.style.display = 'none');

  if (tab === 'alltime') {
    tabs[0]?.classList.add('active');
    document.getElementById('mmHistoryAllTime').style.display = 'block';
    mmLoadAllTime();
  } else if (tab === 'month') {
    tabs[1]?.classList.add('active');
    document.getElementById('mmHistoryMonth').style.display = 'block';
    mmUpdateHistoryMonthLabel();
    mmLoadMonthHistory();
  } else if (tab === 'period') {
    tabs[2]?.classList.add('active');
    document.getElementById('mmHistoryPeriod').style.display = 'block';
  }
}

function mmLoadAllTime() {
  const container = document.getElementById('mmHistoryAllTime');

  // Use cache if available
  if (MM_ALLTIME_CACHE) {
    mmRenderAllTime(MM_ALLTIME_CACHE, container);
    return;
  }

  container.innerHTML = '<div class="mm-loading"><div class="mm-spinner"></div>Loading...</div>';
  google.script.run
    .withSuccessHandler(data => {
      MM_ALLTIME_CACHE = data;
      mmRenderAllTime(data, container);
    })
    .withFailureHandler(err => { container.innerHTML = '<div class="empty-state">Failed to load.</div>'; })
    .mmGetAllTimeSummary();
}

function mmRenderAllTime(data, container) {
  if (!data || !data.length) {
    container.innerHTML = '<div class="empty-state">No transaction history yet.</div>';
    return;
  }

  const chartData = data.slice(-12);
  let html = `<div id="mmHistoryAreaChart" class="mm-history-chart-wrap"></div>`;
  html += `<div class="mm-alltime-table"><div class="mm-alltime-header"><span>Month</span><span>Income</span><span>Expense</span></div>`;
  html += [...data].reverse().map(item => {
    const monthLabel = mmFormatMonthLabel(item.month);
    return `<div class="mm-alltime-row"><span>${monthLabel}</span><span class="positive">${mmFormatIDR(item.income)}</span><span class="negative">${mmFormatIDR(item.expense)}</span></div>`;
  }).join('');
  html += '</div>';
  container.innerHTML = html;

  // ApexCharts area chart
  if (typeof mmHistoryChart !== 'undefined' && mmHistoryChart) { mmHistoryChart.destroy(); }
  const el = document.getElementById('mmHistoryAreaChart');
  if (!el || typeof ApexCharts === 'undefined') return;

  const options = {
    series: [{ name: 'Income', data: chartData.map(d => d.income) }, { name: 'Expense', data: chartData.map(d => d.expense) }],
    chart: { type: 'area', height: 200, background: 'transparent', toolbar: { show: false }, zoom: { enabled: false }, animations: { enabled: true, easing: 'easeinout', speed: 800 } },
    colors: ['#10b981', '#ef4444'],
    stroke: { curve: 'smooth', width: 2.5 },
    fill: { type: 'gradient', gradient: { shadeIntensity: 1, opacityFrom: 0.4, opacityTo: 0, stops: [0, 100] } },
    grid: { show: true, borderColor: 'rgba(255,255,255,0.06)', strokeDashArray: 4, xaxis: { lines: { show: false } }, yaxis: { lines: { show: true } }, padding: { top: 10, bottom: 0 } },
    xaxis: { categories: chartData.map(d => mmFormatMonthLabel(d.month)), axisBorder: { show: false }, axisTicks: { show: false }, labels: { style: { colors: '#a1a1aa', fontSize: '10px', fontFamily: 'Inter' } } },
    yaxis: { labels: { show: false }, max: function(max) { return max * 1.15; } },
    markers: { size: 0, hover: { size: 5, sizeOffset: 2 } },
    tooltip: { theme: 'dark', style: { fontSize: '12px', fontFamily: 'Inter' }, y: { formatter: function(val) { if (typeof AMOUNTS_HIDDEN !== 'undefined' && AMOUNTS_HIDDEN) return '••••••'; return 'Rp' + Number(val).toLocaleString('id-ID'); } } },
    legend: { show: true, position: 'top', horizontalAlign: 'center', fontSize: '11px', fontFamily: 'Inter', fontWeight: 600, labels: { colors: '#a1a1aa' }, markers: { width: 8, height: 8, radius: 4 } },
    dataLabels: { enabled: false }
  };
  mmHistoryChart = new ApexCharts(el, options);
  mmHistoryChart.render();
}

function mmUpdateHistoryMonthLabel() {
  const label = document.getElementById('mmHistoryMonthLabel');
  if (label) label.textContent = mmFormatMonthLabel(`${MM_HIST_YEAR}-${String(MM_HIST_MONTH).padStart(2,'0')}`);
}

function mmPrevMonth() {
  MM_HIST_MONTH--;
  if (MM_HIST_MONTH < 1) { MM_HIST_MONTH = 12; MM_HIST_YEAR--; }
  mmUpdateHistoryMonthLabel();
  mmLoadMonthHistory();
}

function mmNextMonth() {
  MM_HIST_MONTH++;
  if (MM_HIST_MONTH > 12) { MM_HIST_MONTH = 1; MM_HIST_YEAR++; }
  mmUpdateHistoryMonthLabel();
  mmLoadMonthHistory();
}

function mmLoadMonthHistory() {
  const container = document.getElementById('mmHistoryMonthContent');
  const cacheKey = `${MM_HIST_YEAR}-${MM_HIST_MONTH}`;

  // Use cache if available
  if (MM_MONTH_CACHE[cacheKey]) {
    mmRenderMonth(MM_MONTH_CACHE[cacheKey], container);
    return;
  }

  container.innerHTML = '<div class="mm-loading"><div class="mm-spinner"></div>Loading...</div>';
  google.script.run
    .withSuccessHandler(data => {
      MM_MONTH_CACHE[cacheKey] = data;
      mmRenderMonth(data, container);
    })
    .withFailureHandler(err => { container.innerHTML = '<div class="empty-state">Failed to load.</div>'; })
    .mmGetMonthlySummary(MM_HIST_YEAR, MM_HIST_MONTH);
}

function mmRenderMonth(data, container) {
  if (!data) {
    container.innerHTML = '<div class="empty-state">No data.</div>';
    return;
  }
  let html = `
    <div class="mm-month-summary">
      <div class="item"><span>Income</span><strong class="positive">${mmFormatIDR(data.totalIncome)}</strong></div>
      <div class="item"><span>Expense</span><strong class="negative">${mmFormatIDR(data.totalExpense)}</strong></div>
      <div class="item"><span>Saving</span><strong>${mmFormatIDR(data.saving)}</strong></div>
    </div>`;
  html += mmRenderTransactionList(data.transactions || []);
  container.innerHTML = html;
}

function mmLoadPeriod() {
  const start = document.getElementById('mmPeriodStart').value;
  const end = document.getElementById('mmPeriodEnd').value;
  if (!start || !end) {
    showToast('Select start and end date.', 'error');
    return;
  }
  const container = document.getElementById('mmHistoryPeriodContent');
  container.innerHTML = '<div class="mm-loading"><div class="mm-spinner"></div>Loading...</div>';
  google.script.run
    .withSuccessHandler(data => mmRenderPeriod(data, container))
    .withFailureHandler(err => { container.innerHTML = '<div class="empty-state">Failed to load.</div>'; })
    .mmGetTransactions({ startDate: start, endDate: end });
}

function mmRenderPeriod(data, container) {
  if (!data || !data.length) {
    container.innerHTML = '<div class="empty-state">No transactions in this period.</div>';
    return;
  }
  let totalIn = 0, totalOut = 0;
  data.forEach(tx => {
    if (tx.type === 'Income') totalIn += tx.amount;
    if (tx.type === 'Expense') totalOut += tx.amount;
  });
  let html = `
    <div class="mm-month-summary">
      <div class="item"><span>Income</span><strong class="positive">${mmFormatIDR(totalIn)}</strong></div>
      <div class="item"><span>Expense</span><strong class="negative">${mmFormatIDR(totalOut)}</strong></div>
      <div class="item"><span>Net</span><strong>${mmFormatIDR(totalIn - totalOut)}</strong></div>
    </div>`;
  html += mmRenderTransactionList(data);
  container.innerHTML = html;
}

function mmRenderTransactionList(transactions) {
  if (!transactions.length) return '<div class="empty-state">No transactions.</div>';

  return transactions.map(tx => {
    let amtClass = 'income-amt';
    let prefix = '+';
    let subtitle = tx.account;

    if (tx.type === 'Expense') {
      amtClass = 'expense-amt';
      prefix = '-';
      subtitle = `${tx.account} · ${tx.category}${tx.subcategory ? ' / ' + tx.subcategory : ''}`;
    } else if (tx.type === 'Transfer') {
      amtClass = 'transfer-amt';
      prefix = '';
      subtitle = `${tx.account} → ${tx.accountTo}`;
    } else {
      subtitle = `${tx.account}${tx.category ? ' · ' + tx.category : ''}`;
    }

    const catColor = mmCategoryColor(tx.category, tx.type);
    const catIcon = mmCategoryEmoji(tx.category, tx.type);
    const dateStr = mmFormatDate(tx.date);

    return `
      <div class="mm-tx-item" onclick="mmShowTxDetail(${tx.rowNumber}, '${escapeHtml(tx.type)}', '${escapeHtml(tx.account)}', '${escapeHtml(tx.accountTo || '')}', '${escapeHtml(tx.category || '')}', '${escapeHtml(tx.subcategory || '')}', ${tx.amount}, '${escapeHtml(tx.notes || '')}', '${escapeHtml(tx.date || '')}')">
        <div class="mm-tx-icon" style="color:${catColor}">${catIcon}</div>
        <div class="mm-tx-info">
          <div class="tx-title">${escapeHtml(tx.notes || tx.type)}</div>
          <div class="tx-sub">${dateStr} · ${subtitle}</div>
        </div>
        <div class="mm-tx-amount ${amtClass}">${prefix}${mmFormatIDR(tx.amount)}</div>
      </div>`;
  }).join('');
}

function mmFormatShort(value) {
  const abs = Math.abs(value);
  if (abs >= 1000000000) return (value / 1000000000).toFixed(1) + ' M';
  if (abs >= 1000000) return (value / 1000000).toFixed(1) + ' jt';
  if (abs >= 1000) return (value / 1000).toFixed(1) + ' rb';
  return String(value);
}

function mmRenderCalendar(data) {
  const grid = document.getElementById('mmCalendarGrid');
  const detail = document.getElementById('mmCalDayDetail');
  if (detail) detail.style.display = 'none';

  const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  let html = dayNames.map(d => `<div class="mm-cal-header">${d}</div>`).join('');

  const firstDay = new Date(data.year, data.month - 1, 1).getDay();
  const today = new Date();
  const isCurrentMonth = today.getFullYear() === data.year && (today.getMonth() + 1) === data.month;

  // Empty cells before first day
  for (let i = 0; i < firstDay; i++) {
    html += '<div class="mm-cal-day empty"></div>';
  }

  for (let d = 1; d <= data.endDay; d++) {
    const dayData = data.days[d] || { income: 0, expense: 0, transactions: [] };
    const isToday = isCurrentMonth && today.getDate() === d;
    const net = dayData.income - dayData.expense;
    let netHtml = '';
    if (net !== 0) {
      const color = net > 0 ? 'var(--success)' : 'var(--error)';
      const prefix = net > 0 ? '+' : '';
      netHtml = `<span class="mm-cal-amount" style="color:${color}">${prefix}${mmFormatShort(net)}</span>`;
    }

    html += `<div class="mm-cal-day ${isToday ? 'today' : ''}" onclick="mmShowDayDetail(${d}, ${JSON.stringify(dayData).replace(/"/g, '&quot;')})">
      <span class="mm-cal-num">${d}</span>${netHtml}
    </div>`;
  }

  grid.innerHTML = html;
}

function mmShowDayDetail(day, dayData) {
  const detail = document.getElementById('mmCalDayDetail');
  if (!detail) return;

  if (!dayData.transactions || !dayData.transactions.length) {
    detail.style.display = 'block';
    detail.innerHTML = `<p style="font-size:13px;color:var(--text-muted);margin:0;">${day} ${mmFormatMonthLabel(MM_CAL_YEAR+'-'+String(MM_CAL_MONTH).padStart(2,'0'))} — No transactions</p>`;
    return;
  }

  let html = `<p style="font-size:14px;font-weight:700;color:var(--text);margin:0 0 10px;">${day} ${mmFormatMonthLabel(MM_CAL_YEAR+'-'+String(MM_CAL_MONTH).padStart(2,'0'))}</p>`;

  if (dayData.income > 0) html += `<p style="font-size:12px;color:var(--success);margin:0 0 4px;">Income: ${mmFormatIDR(dayData.income)}</p>`;
  if (dayData.expense > 0) html += `<p style="font-size:12px;color:var(--error);margin:0 0 8px;">Expense: ${mmFormatIDR(dayData.expense)}</p>`;

  html += mmRenderTransactionList(dayData.transactions);
  detail.style.display = 'block';
  detail.innerHTML = html;
}

  if (type === 'account') {
    const payload = {
      name: form.querySelector('[name="name"]').value,
      icon: form.querySelector('[name="icon"]').value || 'ðŸ’³',
      initialBalance: parseMoneyInput(form.querySelector('[name="initialBalance"]').value),
      showOnDashboard: form.querySelector('[name="showOnDashboard"]').value === 'true'
    };
    google.script.run
      .withSuccessHandler(result => {
        if (result.success) {
          showToast('Account added.', 'success');
          closeModal('mmModal');
          mmLoadSettings();
          mmLoadDashboard();
        }
      })
      .withFailureHandler(err => showToast(err.message || 'Failed.', 'error'))
      .mmAddAccount(payload);

      category = form.querySelector('[name="customCategory"]').value;

      category: category,
      subcategory: form.querySelector('[name="subcategory"]').value
    };
    if (!payload.category) {
      showToast('Category is required.', 'error');

      .withSuccessHandler(result => {
        if (result.success) {
          showToast('Category added.', 'success');
          closeModal('mmModal');
          mmLoadSettings();
        }
      })
      .withFailureHandler(err => showToast(err.message || 'Failed.', 'error'))

function mmUpdateAllocTotal() {

  inputs.forEach(i => { total += Number(i.value) || 0; });
  const totalEl = document.getElementById('mmAllocTotal');

  if (totalEl) totalEl.textContent = `${total.toFixed(2)}%`;
  if (box) {
    box.classList.remove('good', 'bad');
    box.classList.add(Math.abs(total - 100) <= 0.01 ? 'good' : 'bad');
  }
}

function mmSyncAllocFromUI() {
  const rows = document.querySelectorAll('#mmAllocationRows .allocation-target-row');
  MM_ALLOCATION = Array.from(rows).map(row => ({
    category: row.querySelector('.mm-alloc-cat-input')?.value || '',

function mmSubmitAllocation(event) {
  event.preventDefault();
  mmSyncAllocFromUI();
  const items = MM_ALLOCATION.filter(i => i.category);
  const total = items.reduce((s, i) => s + i.percent, 0);
  if (Math.abs(total - 100) > 0.01) {
    showToast(`Total must be 100%. Current: ${total.toFixed(2)}%`, 'error');
    return;
  }
  const btn = event.target.querySelector('button[type="submit"]');
  setButtonLoading(btn, true, 'Saving...');
  google.script.run
    .withSuccessHandler(result => {
      setButtonLoading(btn, false, 'Save');
      if (result.success) {
        showToast('Allocation saved.', 'success');
        mmLoadDashboard();
      }
    })
    .withFailureHandler(err => {
      setButtonLoading(btn, false, 'Save');
      showToast(err.message || 'Failed.', 'error');
    })
    .mmSaveAllocation({ items });
}

function mmRenderCategories() {

    if (c.subcategory) groups[key].push(c.subcategory);

function mmDeleteCat(groupKey, subcategory) {

    .mmDeleteCategory({ type, category, subcategory });

/* === CATEGORY DETAIL BOTTOM SHEET === */
function mmShowCategoryDetail(category) {
  const sheet = document.getElementById('mmCategoryDetailSheet');
  const content = document.getElementById('mmCategoryDetailContent');
  content.innerHTML = '<div class="mm-loading"><div class="mm-spinner"></div>Loading...</div>';
  sheet.classList.remove('hidden');

  const now = new Date();
  const monthStartStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;

  google.script.run
    .withSuccessHandler(txs => {
      const filtered = txs.filter(tx => (tx.type === 'Expense' || tx.type === 'Income' || (tx.type === 'Transfer' && tx.category)) && tx.category === category);
      if (!filtered.length) {
        content.innerHTML = `<h3 class="sheet-title">${mmCategoryEmoji(category)} ${escapeHtml(category)}</h3><p class="sheet-desc">No transactions this month.</p>`;
        return;
      }

      const total = filtered.reduce((s, tx) => s + tx.amount, 0);

      // Group by subcategory
      const subMap = {};
      filtered.forEach(tx => {
        const sub = tx.subcategory || 'General';
        if (!subMap[sub]) subMap[sub] = { amount: 0, transactions: [] };
        subMap[sub].amount += tx.amount;
        subMap[sub].transactions.push(tx);
      });

      const subs = Object.entries(subMap).sort((a, b) => b[1].amount - a[1].amount);

      let html = `<h3 class="sheet-title">${mmCategoryEmoji(category)} ${escapeHtml(category)}</h3>`;
      html += `<p class="sheet-desc">Total: ${mmFormatIDR(total)}</p>`;

      html += subs.map(([subName, data]) => {
        const txRows = data.transactions.map(tx => `
          <div class="mm-detail-tx-row">
            <span>${escapeHtml(tx.notes || tx.type)} <small style="color:var(--text-muted)">${mmFormatDate(tx.date)}</small></span>
            <strong style="color:var(--error)">${mmFormatIDR(tx.amount)}</strong>
          </div>`).join('');
        return `
          <div class="mm-detail-sub-group">
            <div class="mm-detail-sub-header">
              <span>${escapeHtml(subName)}</span>
              <strong>${mmFormatIDR(data.amount)}</strong>
            </div>
            ${txRows}
          </div>`;
      }).join('');

      content.innerHTML = html;
    })
    .withFailureHandler(err => {
      content.innerHTML = '<div class="empty-state">Failed to load detail.</div>';
    })
    .mmGetTransactions({ startDate: monthStartStr });
}

    document.getElementById('mmCategoryDetailSheet').classList.add('hidden');
  }
}

/* === ACCOUNT TRANSACTIONS DETAIL === */
function mmShowAccountTransactions(accountName) {
  const sheet = document.getElementById('mmCategoryDetailSheet');
  const content = document.getElementById('mmCategoryDetailContent');
  content.innerHTML = '<div class="mm-loading"><div class="mm-spinner"></div>Loading...</div>';
  sheet.classList.remove('hidden');

  // Get transactions from cache
  const txs = (MM_DASHBOARD && MM_DASHBOARD.monthTransactions) || [];
  const filtered = txs.filter(tx => tx.account === accountName || tx.accountTo === accountName);

  if (!filtered.length) {
    content.innerHTML = `<h3 class="sheet-title">${lucideIconSvg('wallet', 18)} ${escapeHtml(accountName)}</h3><p class="sheet-desc">No transactions this month.</p>`;
    return;
  }

  // Calculate totals
  let totalIn = 0, totalOut = 0;
  filtered.forEach(tx => {
    if (tx.type === 'Income' && tx.account === accountName) totalIn += tx.amount;
    else if (tx.type === 'Expense' && tx.account === accountName) totalOut += tx.amount;
    else if (tx.type === 'Transfer') {
      if (tx.accountTo === accountName) totalIn += tx.amount;
      if (tx.account === accountName) totalOut += tx.amount;
    }
  });

  let html = `<h3 class="sheet-title">${lucideIconSvg('wallet', 18)} ${escapeHtml(accountName)}</h3>`;
  html += `<div style="display:flex;gap:12px;margin:8px 0 16px;">`;
  html += `<span style="font-size:12px;color:var(--success);">↓ In: ${mmFormatIDR(totalIn)}</span>`;
  html += `<span style="font-size:12px;color:var(--error);">↑ Out: ${mmFormatIDR(totalOut)}</span>`;
  html += `</div>`;

  // Group by date
  const grouped = {};
  filtered.forEach(tx => {
    if (!grouped[tx.date]) grouped[tx.date] = [];
    grouped[tx.date].push(tx);
  });

  const sortedDates = Object.keys(grouped).sort((a, b) => b.localeCompare(a));

  html += sortedDates.map(date => {
    const dayTxs = grouped[date];
    const rows = dayTxs.map(tx => {
      let prefix = '', color = 'var(--text-muted)';
      if (tx.type === 'Income') { prefix = '+'; color = 'var(--success)'; }
      else if (tx.type === 'Expense') { prefix = '-'; color = 'var(--error)'; }
      else if (tx.type === 'Transfer') {
        if (tx.accountTo === accountName) { prefix = '+'; color = 'var(--success)'; }
        else { prefix = '-'; color = '#60a5fa'; }
      }
      const label = tx.notes || tx.subcategory || tx.category || tx.type;
      const meta = tx.type === 'Transfer' ? (tx.account === accountName ? `→ ${tx.accountTo}` : `← ${tx.account}`) : (tx.category || '');
      return `
        <div class="mm-detail-tx-row">
          <div style="display:flex;flex-direction:column;gap:1px;">
            <span style="font-size:12px;font-weight:600;color:var(--text);">${escapeHtml(label)}</span>
            <span style="font-size:10px;color:var(--text-muted);">${escapeHtml(meta)}</span>
          </div>
          <strong style="color:${color};font-size:13px;">${prefix}${mmFormatIDR(tx.amount)}</strong>
        </div>`;
    }).join('');

    return `
      <div class="mm-detail-sub-group">
        <div class="mm-detail-sub-header">
          <span>${mmFormatDate(date)}</span>
        </div>
        ${rows}
      </div>`;
  }).join('');

  content.innerHTML = html;
}

function mmCategoryEmoji(category, txType) {
  // Transfer
  if (txType === 'Transfer' || (!category && txType !== 'Income')) {
    return lucideIconSvg('arrow-right-left', 16);
  }
  // Lookup from config
  const cfg = MM_CATEGORY_CONFIG[category];
  if (cfg) return lucideIconSvg(cfg.icon, 16);
  // Income generic
  if (txType === 'Income') return lucideIconSvg('wallet', 16);
  // Fallback
  return lucideIconSvg('tag', 16);
}

function mmCategoryColor(category, txType) {
  // Transfer
  if (txType === 'Transfer' || (!category && txType !== 'Income')) return '#60a5fa';
  // Lookup from config
  const cfg = MM_CATEGORY_CONFIG[category];
  if (cfg) return cfg.color;
  // Income generic
  if (txType === 'Income') return '#10b981';
  // Fallback
  return '#64748b';
}

/* === FORMATTING HELPERS === */
function mmFormatIDR(value) {
  if (typeof AMOUNTS_HIDDEN !== 'undefined' && AMOUNTS_HIDDEN) return '••••••';
  return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(Number(value) || 0);
}

function mmFormatDate(value) {
  if (!value) return '-';
  const d = new Date(value);
  if (isNaN(d.getTime())) return String(value);
  return new Intl.DateTimeFormat('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }).format(d);
}

function mmFormatMonthLabel(monthStr) {
  // monthStr: "2024-01"
  const parts = monthStr.split('-');
  const d = new Date(Number(parts[0]), Number(parts[1]) - 1, 1);
  return new Intl.DateTimeFormat('id-ID', { month: 'long', year: 'numeric' }).format(d);
}

/* === CSV HELPERS === */
function csvEscape(value) {
  if (value == null) return '';
  const str = String(value);
  if (str.includes(',') || str.includes('"') || str.includes('\n')) {
    return '"' + str.replace(/"/g, '""') + '"';
  }
  return str;
}

function csvToArray(csv) {
  const lines = csv.split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];

  const headers = parseCsvLine(lines[0]);
  const rows = [];

  for (let i = 1; i < lines.length; i++) {
    const values = parseCsvLine(lines[i]);
    if (values.length === 0) continue;
    const obj = {};
    headers.forEach((h, idx) => { obj[h.trim()] = (values[idx] || '').trim(); });
    rows.push(obj);
  }
  return rows;
}

function parseCsvLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;

  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuotes && line[i + 1] === '"') {
        current += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (ch === ',' && !inQuotes) {
      result.push(current);
      current = '';
    } else {
      current += ch;
    }
  }
  result.push(current);
  return result;
}

/* === EXPORT === */
function mmExportData(target) {
  showToast('Exporting...', 'success');
  google.script.run
    .withSuccessHandler(data => {
      if (target === 'transactions') {
        downloadCsv(buildTransactionsCsv(data.transactions), 'transactions');
      } else if (target === 'accounts') {
        downloadCsv(buildAccountsCsv(data.accounts), 'accounts');
      } else {
        // Export all as separate CSVs in one zip-like approach: multiple downloads
        downloadCsv(buildTransactionsCsv(data.transactions), 'transactions');
        setTimeout(() => downloadCsv(buildAccountsCsv(data.accounts), 'accounts'), 300);
        setTimeout(() => downloadCsv(buildCategoriesCsv(data.categories), 'categories'), 600);
        setTimeout(() => downloadCsv(buildAllocationCsv(data.allocation), 'allocation'), 900);
      }
      showToast('Export berhasil!', 'success');
    })
    .withFailureHandler(err => {
      showToast(err.message || 'Export gagal.', 'error');
    })
    .mmExportAllData(target);
}

function buildTransactionsCsv(rows) {
  const headers = ['date', 'type', 'account', 'accountTo', 'category', 'subcategory', 'amount', 'notes'];
  let csv = headers.join(',') + '\n';
  (rows || []).forEach(r => {
    csv += [r.date, r.type, csvEscape(r.account), csvEscape(r.accountTo), csvEscape(r.category), csvEscape(r.subcategory), r.amount, csvEscape(r.notes)].join(',') + '\n';
  });
  return csv;
}

function downloadCsv(csvContent, name) {
  const bom = '\uFEFF'; // UTF-8 BOM for Excel compatibility
  const blob = new Blob([bom + csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${name}-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function mmImportData(event) {
  const file = event.target.files[0];
  if (!file) return;

  const statusEl = document.getElementById('mmImportStatus');
  statusEl.style.display = 'block';
  statusEl.className = 'import-status';
  statusEl.textContent = 'Membaca file...';

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const csv = e.target.result;
      const rows = csvToArray(csv);

      if (!rows.length) {
        statusEl.className = 'import-status error';
        statusEl.textContent = 'File CSV kosong atau format tidak valid.';
        event.target.value = '';
        return;
      }

      // Validate headers
      const firstRow = rows[0];
      if (!firstRow.date && !firstRow.type && !firstRow.amount) {
        statusEl.className = 'import-status error';
        statusEl.textContent = 'Header CSV tidak valid. Pastikan ada kolom: date, type, amount.';
        event.target.value = '';
        return;
      }

      // Confirm
      if (!confirm(`Import ${rows.length} transaksi dari CSV?\n\nData akan ditambahkan ke data existing.`)) {
        statusEl.style.display = 'none';
        event.target.value = '';
        return;
      }

      statusEl.textContent = 'Importing...';

      google.script.run
        .withSuccessHandler(result => {
          if (result.success) {
            statusEl.className = 'import-status success';
            statusEl.textContent = result.message;
            MM_DASHBOARD = null;
            if (typeof mmLoadDashboard === 'function') mmLoadDashboard();
          } else {
            statusEl.className = 'import-status error';
            statusEl.textContent = result.message || 'Import gagal.';
          }
          event.target.value = '';
        })
        .withFailureHandler(err => {
          statusEl.className = 'import-status error';
          statusEl.textContent = err.message || 'Import gagal.';
          event.target.value = '';
        })
        .mmImportData({ rows: rows });

    } catch (err) {
      statusEl.className = 'import-status error';
      statusEl.textContent = 'Gagal membaca file: ' + err.message;
      event.target.value = '';
    }
  };
  reader.readAsText(file);
}

/* === DELETE DATA === */
function mmDeleteDataPrompt(target) {
  const labels = {
    transactions: 'SEMUA TRANSAKSI',
    accounts: 'SEMUA AKUN',
    categories: 'SEMUA KATEGORI',
    all: 'SEMUA DATA (RESET TOTAL)'
  };

  const label = labels[target] || target;

  // First confirmation
  if (!confirm(`Anda yakin ingin menghapus ${label}?\n\nTindakan ini TIDAK DAPAT dibatalkan!`)) return;

  // Second confirmation for extra safety
  const confirmText = target === 'all' ? 'HAPUS SEMUA' : 'HAPUS';
  const userInput = prompt(`Ketik "${confirmText}" untuk konfirmasi penghapusan:`);

  if (userInput !== confirmText) {
    showToast('Penghapusan dibatalkan.', 'error');
    return;
  }

  showToast('Menghapus data...', 'error');

  google.script.run
    .withSuccessHandler(result => {
      if (result.success) {
        showToast(result.message, 'success');
        // Reset caches and reload
        MM_DASHBOARD = null;
        MM_ACCOUNTS = [];
        MM_CATEGORIES = [];
        MM_ALLOCATION = [];
        if (typeof mmLoadDashboard === 'function') mmLoadDashboard();
        if (typeof mmLoadSettings === 'function') mmLoadSettings();
      } else {
        showToast(result.message || 'Gagal menghapus.', 'error');
      }
    })
    .withFailureHandler(err => {
      showToast(err.message || 'Gagal menghapus.', 'error');
    })
    .mmDeleteData(target);
}
